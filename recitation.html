<style>
:root{--bg:#f0f4f0;--text:#2d4a2d;--card:#fff;--border:#c8d9c0;--gold:#c4a84a;--accent:#4a7c4a;--surface2:#f4f8f2;--surface3:#f8fbf6;--surface-hover:#e0edd8;--accent-dark:#3a6a3a;--wrong-border:#c0392b;--teal:#3a7a7c;}
html[data-theme="dark"]{--bg:#1c2420;--text:#d9ecd9;--card:#232f29;--border:#3a4d40;--gold:#d9b96a;--accent:#5fae5f;--surface2:#2a3830;--surface3:#1f2a24;--surface-hover:#324438;--accent-dark:#7fcf7f;--wrong-border:#e74c3c;--teal:#5fb8ba;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Amiri','Scheherazade New',serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;}
.top-bar{background:var(--bg);padding:12px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.back-btn{background:none;border:none;color:var(--accent);font-size:18px;cursor:pointer;text-decoration:none;font-family:inherit;}
#theme-toggle{background:var(--surface2);border:1.5px solid var(--border);border-radius:50%;width:36px;height:36px;font-size:16px;cursor:pointer;margin-right:auto;}
.info-card{margin:16px 16px 12px;background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:20px;text-align:center;position:relative;}
.info-card::before,.info-card::after{content:'✦';color:var(--gold);font-size:18px;position:absolute;top:14px;}
.info-card::before{right:16px;}.info-card::after{left:16px;}
.page-title{font-size:24px;font-weight:700;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--accent);line-height:1.7;}
.select-card{margin:0 16px 12px;background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:18px 16px;}
.select-label{font-size:14px;color:var(--accent);margin-bottom:10px;font-weight:700;}
.surah-select{width:100%;padding:12px 14px;font-family:'Amiri',serif;font-size:16px;border:1.5px solid var(--border);border-radius:12px;background:var(--surface2);color:var(--text);direction:rtl;outline:none;cursor:pointer;}
.surah-select:focus{border-color:var(--accent);}
.selected-info{margin-top:10px;font-size:13px;color:var(--accent);background:var(--surface2);border-radius:8px;padding:8px 12px;text-align:center;display:none;}
.rec-card{margin:0 16px 12px;background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:20px;}
.rec-desc{font-size:13px;color:#888;text-align:center;margin-bottom:16px;line-height:1.8;}
.rec-btn{width:100%;padding:18px;border-radius:14px;font-size:18px;font-family:inherit;cursor:pointer;border:2px solid var(--border);background:var(--surface2);color:var(--text);transition:all .25s;margin-bottom:10px;}
.rec-btn.recording{background:#e74c3c;color:#fff;border-color:#e74c3c;animation:pulse 1.2s infinite;}
.rec-btn.paused{background:#e67e22;color:#fff;border-color:#e67e22;}
.reveal-btn{width:100%;padding:10px;border-radius:10px;font-size:13px;font-family:inherit;cursor:pointer;border:1.5px dashed var(--border);background:transparent;color:var(--accent);margin-bottom:10px;}
.reveal-btn:hover{background:var(--surface2);}
.ayah-num{color:#c4a84a;font-size:13px;vertical-align:middle;}
.reveal-box{background:var(--surface3);border:1.5px solid var(--border);border-radius:12px;padding:14px;font-family:'Scheherazade New',serif;font-size:19px;line-height:2.6;direction:rtl;text-align:right;margin-bottom:10px;color:var(--text);}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.4);}50%{box-shadow:0 0 0 10px rgba(231,76,60,0);}}
.clear-btn{width:100%;padding:10px;border-radius:10px;font-size:14px;font-family:inherit;cursor:pointer;border:1.5px solid var(--wrong-border);background:transparent;color:var(--wrong-border);visibility:hidden;margin-bottom:10px;}
.clear-btn.visible{visibility:visible;}
.transcript-box{background:var(--surface3);border:1.5px solid var(--border);border-radius:12px;padding:14px;font-size:17px;line-height:2.2;direction:rtl;text-align:right;min-height:80px;margin-bottom:12px;color:var(--text);}
.check-btn{width:100%;padding:13px;border-radius:12px;font-size:17px;font-family:inherit;cursor:pointer;background:var(--accent);color:#fff;border:none;visibility:hidden;}
.check-btn.visible{visibility:visible;}
.check-btn:hover{background:var(--accent-dark);}
.rec-word{display:inline-block;background:var(--surface2);border-radius:4px;padding:2px 6px;margin:2px 1px;cursor:pointer;}
.rec-word:hover{opacity:0.7;text-decoration:line-through;}
.result-card{margin:0 16px 16px;background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:20px;display:none;}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.result-title{font-size:17px;font-weight:700;color:var(--accent);}
.result-stats{display:flex;gap:8px;}
.stat{border-radius:10px;padding:5px 12px;font-size:13px;font-weight:700;}
.stat.ok{background:#d4edda;color:#1a5c1a;}
.stat.err{background:#f8d7da;color:#7a1a1a;}
.stat.pct{background:var(--surface2);color:var(--accent);}
.score-bar{background:var(--surface2);border-radius:8px;height:10px;margin-bottom:14px;overflow:hidden;}
.score-fill{height:100%;border-radius:8px;transition:width .6s;}
.where-msg{font-size:12px;color:var(--accent);background:var(--surface2);border-radius:8px;padding:7px 12px;margin-bottom:12px;text-align:center;}
.legend{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;}
.legend-dot{width:13px;height:13px;border-radius:3px;}
.ayah-display{font-family:'Scheherazade New',serif;font-size:19px;line-height:3;direction:rtl;text-align:right;}
.w-ok{color:#155724;background:#c3e6cb;border-radius:4px;padding:1px 4px;margin:1px;}
.w-err{color:#fff;background:#c0392b;border-radius:4px;padding:1px 4px;margin:1px;}
.w-missing{color:#999;background:#f0f0f0;border-radius:4px;padding:1px 4px;margin:1px;text-decoration:line-through;}
.retry-btn{width:100%;padding:11px;border-radius:11px;font-size:15px;font-family:inherit;cursor:pointer;background:var(--surface2);color:var(--accent);border:1.5px solid var(--border);margin-top:10px;}
.confetti-piece{position:fixed;top:-20px;z-index:9999;pointer-events:none;border-radius:2px;animation:confettiFall linear forwards;}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg);opacity:1;}
  100%{transform:translateY(110vh) rotate(540deg);opacity:0.9;}
}
</style>
</head>

<script>

const AYAHS = {
  fatiha: [`بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ`, `ٱلْحَمْدُ لِلَّهِ رَبِّ ٱلْعَٰلَمِينَ`, `ٱلرَّحْمَٰنِ ٱلرَّحِيمِ`, `مَٰلِكِ يَوْمِ ٱلدِّينِ`, `إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ`, `ٱهْدِنَا ٱلصِّرَٰطَ ٱلْمُسْتَقِيمَ`, `صِرَٰطَ ٱلَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ ٱلْمَغْضُوبِ عَلَيْهِمْ وَلَا ٱلضَّآلِّينَ`],
  allayl: [`وَٱلَّيۡلِ إِذَا يَغۡشَىٰ`, `وَٱلنَّهَارِ إِذَا تَجَلَّىٰ`, `وَمَا خَلَقَ ٱلذَّكَرَ وَٱلۡأُنثَىٰ`, `إِنَّ سَعۡيَكُمۡ لَشَتَّىٰ`, `فَأَمَّا مَنۡ أَعۡطَىٰ وَٱتَّقَىٰ`, `وَصَدَّقَ بِٱلۡحُسۡنَىٰ`, `فَسَنُيَسِّرُهُۥ لِلۡيُسۡرَىٰ`, `وَأَمَّا مَنۢ بَخِلَ وَٱسۡتَغۡنَىٰ`, `وَكَذَّبَ بِٱلۡحُسۡنَىٰ`, `فَسَنُيَسِّرُهُۥ لِلۡعُسۡرَىٰ`, `وَمَا يُغۡنِي عَنۡهُ مَالُهُۥٓ إِذَا تَرَدَّىٰ`, `إِنَّ عَلَيۡنَا لَلۡهُدَىٰ`, `وَإِنَّ لَنَا لَلۡأٓخِرَةَ وَٱلۡأُولَىٰ`, `فَأَنذَرۡتُكُمۡ نَارٗا تَلَظَّىٰ`, `لَا يَصۡلَىٰهَآ إِلَّا ٱلۡأَشۡقَى`, `ٱلَّذِي كَذَّبَ وَتَوَلَّىٰ`, `وَسَيُجَنَّبُهَا ٱلۡأَتۡقَى`, `ٱلَّذِي يُؤۡتِي مَالَهُۥ يَتَزَكَّىٰ`, `وَمَا لِأَحَدٍ عِندَهُۥ مِن نِّعۡمَةٖ تُجۡزَىٰ`, `إِلَّا ٱبۡتِغَآءَ وَجۡهِ رَبِّهِ ٱلۡأَعۡلَىٰ`, `وَلَسَوۡفَ يَرۡضَىٰ`],
  alduha: [`وَٱلضُّحَىٰ`, `وَٱلَّيۡلِ إِذَا سَجَىٰ`, `مَا وَدَّعَكَ رَبُّكَ وَمَا قَلَىٰ`, `وَلَلۡأٓخِرَةُ خَيۡرٞ لَّكَ مِنَ ٱلۡأُولَىٰ`, `وَلَسَوۡفَ يُعۡطِيكَ رَبُّكَ فَتَرۡضَىٰ`, `أَلَمۡ يَجِدۡكَ يَتِيمٗا فَـَٔاوَىٰ`, `وَوَجَدَكَ ضَآلّٗا فَهَدَىٰ`, `وَوَجَدَكَ عَآئِلٗا فَأَغۡنَىٰ`, `فَأَمَّا ٱلۡيَتِيمَ فَلَا تَقۡهَرۡ`, `وَأَمَّا ٱلسَّآئِلَ فَلَا تَنۡهَرۡ`, `وَأَمَّا بِنِعۡمَةِ رَبِّكَ فَحَدِّثۡ`],
  alsharh: [`أَلَمۡ نَشۡرَحۡ لَكَ صَدۡرَكَ`, `وَوَضَعۡنَا عَنكَ وِزۡرَكَ`, `ٱلَّذِيٓ أَنقَضَ ظَهۡرَكَ`, `وَرَفَعۡنَا لَكَ ذِكۡرَكَ`, `فَإِنَّ مَعَ ٱلۡعُسۡرِ يُسۡرٗا`, `إِنَّ مَعَ ٱلۡعُسۡرِ يُسۡرٗا`, `فَإِذَا فَرَغۡتَ فَٱنصَبۡ`, `وَإِلَىٰ رَبِّكَ فَٱرۡغَب`],
  alshams: [`وَٱلشَّمۡسِ وَضُحَىٰهَا`, `وَٱلۡقَمَرِ إِذَا تَلَىٰهَا`, `وَٱلنَّهَارِ إِذَا جَلَّىٰهَا`, `وَٱلَّيۡلِ إِذَا يَغۡشَىٰهَا`, `وَٱلسَّمَآءِ وَمَا بَنَىٰهَا`, `وَٱلۡأَرۡضِ وَمَا طَحَىٰهَا`, `وَنَفۡسٖ وَمَا سَوَّىٰهَا`, `فَأَلۡهَمَهَا فُجُورَهَا وَتَقۡوَىٰهَا`, `قَدۡ أَفۡلَحَ مَن زَكَّىٰهَا`, `وَقَدۡ خَابَ مَن دَسَّىٰهَا`, `كَذَّبَتۡ ثَمُودُ بِطَغۡوَىٰهَآ`, `إِذِ ٱنۢبَعَثَ أَشۡقَىٰهَا`, `فَقَالَ لَهُمۡ رَسُولُ ٱللَّهِ نَاقَةَ ٱللَّهِ وَسُقۡيَٰهَا`, `فَكَذَّبُوهُ فَعَقَرُوهَا فَدَمۡدَمَ عَلَيۡهِمۡ رَبُّهُم بِذَنۢبِهِمۡ فَسَوَّىٰهَا`, `وَلَا يَخَافُ عُقۡبَٰهَا`],
  altariq: [`وَٱلسَّمَآءِ وَٱلطَّارِقِ`, `وَمَآ أَدْرَىٰكَ مَا ٱلطَّارِقُ`, `ٱلنَّجْمُ ٱلثَّاقِبُ`, `إِن كُلُّ نَفْسٍ لَّمَّا عَلَيْهَا حَافِظٌ`, `فَلْيَنظُرِ ٱلْإِنسَٰنُ مِمَّ خُلِقَ`, `خُلِقَ مِن مَّآءٍ دَافِقٍ`, `يَخْرُجُ مِنۢ بَيْنِ ٱلصُّلْبِ وَٱلتَّرَآئِبِ`, `إِنَّهُۥ عَلَىٰ رَجْعِهِۦ لَقَادِرٌ`, `يَوْمَ تُبْلَى ٱلسَّرَآئِرُ`, `فَمَا لَهُۥ مِن قُوَّةٍ وَلَا نَاصِرٍ`, `وَٱلسَّمَآءِ ذَاتِ ٱلرَّجْعِ`, `وَٱلْأَرْضِ ذَاتِ ٱلصَّدْعِ`, `إِنَّهُۥ لَقَوْلٌ فَصْلٌ`, `وَمَا هُوَ بِٱلْهَزْلِ`, `إِنَّهُمْ يَكِيدُونَ كَيْدًا`, `وَأَكِيدُ كَيْدًا`, `فَمَهِّلِ ٱلْكَٰفِرِينَ أَمْهِلْهُمْ رُوَيْدًا`],
  alaala: [`سَبِّحِ ٱسْمَ رَبِّكَ ٱلْأَعْلَى`, `ٱلَّذِى خَلَقَ فَسَوَّىٰ`, `وَٱلَّذِى قَدَّرَ فَهَدَىٰ`, `وَٱلَّذِىٓ أَخْرَجَ ٱلْمَرْعَىٰ`, `فَجَعَلَهُۥ غُثَآءً أَحْوَىٰ`, `سَنُقْرِئُكَ فَلَا تَنسَىٰ`, `إِلَّا مَا شَآءَ ٱللَّهُ`, `إِنَّهُۥ يَعْلَمُ ٱلْجَهْرَ وَمَا يَخْفَىٰ`, `وَنُيَسِّرُكَ لِلْيُسْرَىٰ`, `فَذَكِّرْ إِن نَّفَعَتِ ٱلذِّكْرَىٰ`, `سَيَذَّكَّرُ مَن يَخْشَىٰ`, `وَيَتَجَنَّبُهَا ٱلْأَشْقَى`, `ٱلَّذِى يَصْلَى ٱلنَّارَ ٱلْكُبْرَىٰ`, `ثُمَّ لَا يَمُوتُ فِيهَا وَلَا يَحْيَىٰ`, `قَدْ أَفْلَحَ مَن تَزَكَّىٰ`, `وَذَكَرَ ٱسْمَ رَبِّهِۦ فَصَلَّىٰ`, `بَلْ تُؤْثِرُونَ ٱلْحَيَوٰةَ ٱلدُّنْيَا`, `وَٱلْءَاخِرَةُ خَيْرٌ وَأَبْقَىٰ`, `إِنَّ هَٰذَا لَفِى ٱلصُّحُفِ ٱلْأُولَىٰ صُحُفِ إِبْرَٰهِيمَ وَمُوسَىٰ`],
  alalaq: [`ٱقۡرَأۡ بِٱسۡمِ رَبِّكَ ٱلَّذِي خَلَقَ`, `خَلَقَ ٱلۡإِنسَٰنَ مِنۡ عَلَقٍ`, `ٱقۡرَأۡ وَرَبُّكَ ٱلۡأَكۡرَمُ`, `ٱلَّذِي عَلَّمَ بِٱلۡقَلَمِ`, `عَلَّمَ ٱلۡإِنسَٰنَ مَا لَمۡ يَعۡلَمۡ`, `كَلَّآ إِنَّ ٱلۡإِنسَٰنَ لَيَطۡغَىٰٓ`, `أَن رَّءَاهُ ٱسۡتَغۡنَىٰ`, `إِنَّ إِلَىٰ رَبِّكَ ٱلرُّجۡعَىٰ`, `أَرَءَيۡتَ ٱلَّذِي يَنۡهَىٰ`, `عَبۡدًا إِذَا صَلَّىٰ`, `أَرَءَيۡتَ إِن كَانَ عَلَى ٱلۡهُدَىٰ`, `أَوۡ أَمَرَ بِٱلتَّقۡوَىٰ`, `أَرَءَيۡتَ إِن كَذَّبَ وَتَوَلَّىٰ`, `أَلَمۡ يَعۡلَم بِأَنَّ ٱللَّهَ يَرَىٰ`, `كَلَّا لَئِن لَّمۡ يَنتَهِ لَنَسۡفَعَۢا بِٱلنَّاصِيَةِ`, `نَاصِيَةٖ كَٰذِبَةٍ خَاطِئَةٍ`, `فَلۡيَدۡعُ نَادِيَهُۥ`, `سَنَدۡعُ ٱلزَّبَانِيَةَ`, `كَلَّا لَا تُطِعۡهُ وَٱسۡجُدۡ وَٱقۡتَرِب`],
  alqadr: [`إِنَّآ أَنزَلۡنَٰهُ فِي لَيۡلَةِ ٱلۡقَدۡرِ`, `وَمَآ أَدۡرَىٰكَ مَا لَيۡلَةُ ٱلۡقَدۡرِ`, `لَيۡلَةُ ٱلۡقَدۡرِ خَيۡرٞ مِّنۡ أَلۡفِ`, `شَهۡرٖ تَنَزَّلُ ٱلۡمَلَٰٓئِكَةُ وَٱلرُّوحُ فِيهَا بِإِذۡنِ رَبِّهِم`, `مِّن كُلِّ أَمۡرٖ سَلَٰمٌ هِيَ حَتَّىٰ مَطۡلَعِ ٱلۡفَجۡرِ`],
  alzalzala: [`إِذَا زُلۡزِلَتِ ٱلۡأَرۡضُ زِلۡزَالَهَا`, `وَأَخۡرَجَتِ ٱلۡأَرۡضُ أَثۡقَالَهَا`, `وَقَالَ ٱلۡإِنسَٰنُ مَا لَهَا`, `يَوۡمَئِذٖ تُحَدِّثُ أَخۡبَارَهَا`, `بِأَنَّ رَبَّكَ أَوۡحَىٰ لَهَا`, `يَوۡمَئِذٖ يَصۡدُرُ ٱلنَّاسُ أَشۡتَاتٗا لِّيُرَوۡاْ أَعۡمَٰلَهُمۡ`, `فَمَن يَعۡمَلۡ مِثۡقَالَ ذَرَّةٍ خَيۡرٗا يَرَهُۥ`, `وَمَن يَعۡمَلۡ مِثۡقَالَ ذَرَّةٖ شَرّٗا يَرَهُۥ`],
  alqaria: [`ٱلۡقَارِعَةُ`, `مَا ٱلۡقَارِعَةُ`, `وَمَآ أَدۡرَىٰكَ مَا ٱلۡقَارِعَةُ`, `يَوۡمَ يَكُونُ ٱلنَّاسُ كَٱلۡفَرَاشِ ٱلۡمَبۡثُوثِ`, `وَتَكُونُ ٱلۡجِبَالُ كَٱلۡعِهۡنِ ٱلۡمَنفُوشِ`, `فَأَمَّا مَن ثَقُلَتۡ مَوَٰزِينُهُۥ`, `فَهُوَ فِي عِيشَةٖ رَّاضِيَةٖ`, `وَأَمَّا مَنۡ خَفَّتۡ مَوَٰزِينُهُۥ`, `فَأُمُّهُۥ هَاوِيَةٞ`, `وَمَآ أَدۡرَىٰكَ مَا هِيَهۡ`, `نَارٌ حَامِيَةٌۢ`],
  altakathur: [`أَلۡهَىٰكُمُ ٱلتَّكَاثُرُ`, `حَتَّىٰ زُرۡتُمُ ٱلۡمَقَابِرَ`, `كَلَّا سَوۡفَ تَعۡلَمُونَ`, `ثُمَّ كَلَّا سَوۡفَ تَعۡلَمُونَ`, `كَلَّا لَوۡ تَعۡلَمُونَ عِلۡمَ ٱلۡيَقِينِ`, `لَتَرَوُنَّ ٱلۡجَحِيمَ`, `ثُمَّ لَتَرَوُنَّهَا عَيۡنَ ٱلۡيَقِينِ`, `ثُمَّ لَتُسۡـَٔلُنَّ يَوۡمَئِذٍ عَنِ ٱلنَّعِيمِ`],
  alasr: [`وَٱلۡعَصۡرِ`, `إِنَّ ٱلۡإِنسَٰنَ لَفِي خُسۡرٍ`, `إِلَّا ٱلَّذِينَ ءَامَنُواْ وَعَمِلُواْ ٱلصَّٰلِحَٰتِ وَتَوَاصَوۡاْ بِٱلۡحَقِّ وَتَوَاصَوۡاْ بِٱلصَّبۡرِ`],
  alhumaza: [`وَيۡلٞ لِّكُلِّ هُمَزَةٖ لُّمَزَةٍ`, `ٱلَّذِي جَمَعَ مَالٗا وَعَدَّدَهُۥ`, `يَحۡسَبُ أَنَّ مَالَهُۥٓ أَخۡلَدَهُۥ`, `كَلَّا لَيُنۢبَذَنَّ فِي ٱلۡحُطَمَةِ`, `وَمَآ أَدۡرَىٰكَ مَا ٱلۡحُطَمَةُ`, `نَارُ ٱللَّهِ ٱلۡمُوقَدَةُ`, `ٱلَّتِي تَطَّلِعُ عَلَى ٱلۡأَفۡـِٔدَةِ`, `إِنَّهَا عَلَيۡهِم مُّؤۡصَدَةٌ`, `فِي عَمَدٖ مُّمَدَّدَةِۭ`],
  aquraysh: [`لِإِيلَٰفِ قُرَيۡشٍ`, `إِۦلَٰفِهِمۡ رِحۡلَةَ ٱلشِّتَآءِ وَٱلصَّيۡفِ فَلۡيَعۡبُدُواْ`, `رَبَّ هَٰذَا ٱلۡبَيۡتِ ٱلَّذِيٓ`, `أَطۡعَمَهُم مِّن جُوعٖ وَءَامَنَهُم مِّنۡ خَوۡفِۭ`],
  almaoon: [`أَرَءَيۡتَ ٱلَّذِي يُكَذِّبُ بِٱلدِّينِ`, `فَذَٰلِكَ ٱلَّذِي يَدُعُّ ٱلۡيَتِيمَ`, `وَلَا يَحُضُّ عَلَىٰ طَعَامِ ٱلۡمِسۡكِينِ`, `فَوَيۡلٞ لِّلۡمُصَلِّينَ`, `ٱلَّذِينَ هُمۡ عَن صَلَاتِهِمۡ سَاهُونَ`, `ٱلَّذِينَ هُمۡ يُرَآءُونَ`, `وَيَمۡنَعُونَ ٱلۡمَاعُونَ`],
  alikhlas: [`قُلۡ هُوَ ٱللَّهُ أَحَدٌ`, `ٱللَّهُ ٱلصَّمَدُ`, `لَمۡ يَلِدۡ وَلَمۡ يُولَدۡ`, `وَلَمۡ يَكُن لَّهُۥ كُفُوًا أَحَدٌ`],
  alkafirun: [`قُلۡ يَٰٓأَيُّهَا ٱلۡكَٰفِرُونَ`, `لَآ أَعۡبُدُ مَا تَعۡبُدُونَ`, `وَلَآ أَنتُمۡ عَٰبِدُونَ مَآ أَعۡبُدُ`, `وَلَآ أَنَا۠ عَابِدٞ مَّا عَبَدتُّمۡ`, `وَلَآ أَنتُمۡ عَٰبِدُونَ مَآ أَعۡبُدُ`, `لَكُمۡ دِينُكُمۡ وَلِيَ دِينِ`],
  almasad: [`تَبَّتۡ يَدَآ أَبِي لَهَبٖ وَتَبَّ`, `مَآ أَغۡنَىٰ عَنۡهُ مَالُهُۥ وَمَا كَسَبَ`, `سَيَصۡلَىٰ نَارٗا ذَاتَ لَهَبٖ`, `وَٱمۡرَأَتُهُۥ حَمَّالَةَ ٱلۡحَطَبِ`, `فِي جِيدِهَا حَبۡلٞ مِّن مَّسَدِۭ`],
  alfalaq: [`قُلۡ أَعُوذُ بِرَبِّ ٱلۡفَلَقِ`, `مِن شَرِّ مَا خَلَقَ`, `وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ`, `وَمِن شَرِّ ٱلنَّفَّٰثَٰتِ فِي ٱلۡعُقَدِ`, `وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ`],
  alnnas: [`قُلۡ أَعُوذُ بِرَبِّ ٱلنَّاسِ`, `مَلِكِ ٱلنَّاسِ`, `إِلَٰهِ ٱلنَّاسِ`, `مِن شَرِّ ٱلۡوَسۡوَاسِ ٱلۡخَنَّاسِ`, `ٱلَّذِي يُوَسۡوِسُ فِي صُدُورِ ٱلنَّاسِ`, `مِنَ ٱلۡجِنَّةِ وَٱلنَّاسِ`],
};

  fatiha: `بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ ٱلْحَمْدُ لِلَّهِ رَبِّ ٱلْعَٰلَمِينَ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ مَٰلِكِ يَوْمِ ٱلدِّينِ إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ ٱهْدِنَا ٱلصِّرَٰطَ ٱلْمُسْتَقِيمَ صِرَٰطَ ٱلَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ ٱلْمَغْضُوبِ عَلَيْهِمْ وَلَا ٱلضَّآلِّينَ`,
  baqara_p2: `بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ الٓمٓ ذَٰلِكَ ٱلْكِتَٰبُ لَا رَيْبَ فِيهِ هُدًى لِّلْمُتَّقِينَ ٱلَّذِينَ يُؤْمِنُونَ بِٱلْغَيْبِ وَيُقِيمُونَ ٱلصَّلَوٰةَ وَمِمَّا رَزَقْنَٰهُمْ يُنفِقُونَ وَٱلَّذِينَ يُؤْمِنُونَ بِمَآ أُنزِلَ إِلَيْكَ وَمَآ أُنزِلَ مِن قَبْلِكَ وَبِٱلْءَاخِرَةِ هُمْ يُوقِنُونَ أُوْلَٰٓئِكَ عَلَىٰ هُدًى مِّن رَّبِّهِمْ وَأُوْلَٰٓئِكَ هُمُ ٱلْمُفْلِحُونَ`,
  baqara_p3: `إِنَّ ٱلَّذِينَ كَفَرُوا سَوَآءٌ عَلَيْهِمْ ءَأَنذَرْتَهُمْ أَمْ لَمْ تُنذِرْهُمْ لَا يُؤْمِنُونَ خَتَمَ ٱللَّهُ عَلَىٰ قُلُوبِهِمْ وَعَلَىٰ سَمْعِهِمْ وَعَلَىٰٓ أَبْصَٰرِهِمْ غِشَٰوَةٌ وَلَهُمْ عَذَابٌ عَظِيمٌ وَمِنَ ٱلنَّاسِ مَن يَقُولُ ءَامَنَّا بِٱللَّهِ وَبِٱلْيَوْمِ ٱلْءَاخِرِ وَمَا هُم بِمُؤْمِنِينَ يُخَٰدِعُونَ ٱللَّهَ وَٱلَّذِينَ ءَامَنُوا وَمَا يَخْدَعُونَ إِلَّآ أَنفُسَهُمْ وَمَا يَشْعُرُونَ فِى قُلُوبِهِم مَّرَضٌ فَزَادَهُمُ ٱللَّهُ مَرَضًا وَلَهُمْ عَذَابٌ أَلِيمٌ بِمَا كَانُوا يَكْذِبُونَ وَإِذَا قِيلَ لَهُمْ لَا تُفْسِدُوا فِى ٱلْأَرْضِ قَالُوٓا إِنَّمَا نَحْنُ مُصْلِحُونَ أَلَآ إِنَّهُمْ هُمُ ٱلْمُفْسِدُونَ وَلَٰكِن لَّا يَشْعُرُونَ وَإِذَا قِيلَ لَهُمْ ءَامِنُوا كَمَآ ءَامَنَ ٱلنَّاسُ قَالُوٓا أَنُؤْمِنُ كَمَآ ءَامَنَ ٱلسُّفَهَآءُ أَلَآ إِنَّهُمْ هُمُ ٱلسُّفَهَآءُ وَلَٰكِن لَّا يَعْلَمُونَ`,
  baqara_p4: `وَإِذَا لَقُوا ٱلَّذِينَ ءَامَنُوا قَالُوٓا ءَامَنَّا وَإِذَا خَلَوْا إِلَىٰ شَيَٰطِينِهِمْ قَالُوٓا إِنَّا مَعَكُمْ إِنَّمَا نَحْنُ مُسْتَهْزِءُونَ ٱللَّهُ يَسْتَهْزِئُ بِهِمْ وَيَمُدُّهُمْ فِى طُغْيَٰنِهِمْ يَعْمَهُونَ أُوْلَٰٓئِكَ ٱلَّذِينَ ٱشْتَرَوُا ٱلضَّلَٰلَةَ بِٱلْهُدَىٰ فَمَا رَبِحَت تِّجَٰرَتُهُمْ وَمَا كَانُوا مُهْتَدِينَ مَثَلُهُمْ كَمَثَلِ ٱلَّذِى ٱسْتَوْقَدَ نَارًا فَلَمَّآ أَضَآءَتْ مَا حَوْلَهُۥ ذَهَبَ ٱللَّهُ بِنُورِهِمْ وَتَرَكَهُمْ فِى ظُلُمَٰتٍ لَّا يُبْصِرُونَ صُمٌّ بُكْمٌ عُمْىٌ فَهُمْ لَا يَرْجِعُونَ أَوْ كَصَيِّبٍ مِّنَ ٱلسَّمَآءِ فِيهِ ظُلُمَٰتٌ وَرَعْدٌ وَبَرْقٌ يَجْعَلُونَ أَصَٰبِعَهُمْ فِىٓ ءَاذَانِهِم مِّنَ ٱلصَّوَٰعِقِ حَذَرَ ٱلْمَوْتِ وَٱللَّهُ مُحِيطٌ بِٱلْكَٰفِرِينَ يَكَادُ ٱلْبَرْقُ يَخْطَفُ أَبْصَٰرَهُمْ كُلَّمَآ أَضَآءَ لَهُم مَّشَوْا فِيهِ وَإِذَآ أَظْلَمَ عَلَيْهِمْ قَامُوا وَلَوْ شَآءَ ٱللَّهُ لَذَهَبَ بِسَمْعِهِمْ وَأَبْصَٰرِهِمْ إِنَّ ٱللَّهَ عَلَىٰ كُلِّ شَىْءٍ قَدِيرٌ`,
  baqara_p5: `يَٰٓأَيُّهَا ٱلنَّاسُ ٱعْبُدُوا رَبَّكُمُ ٱلَّذِى خَلَقَكُمْ وَٱلَّذِينَ مِن قَبْلِكُمْ لَعَلَّكُمْ تَتَّقُونَ ٱلَّذِى جَعَلَ لَكُمُ ٱلْأَرْضَ فِرَٰشًا وَٱلسَّمَآءَ بِنَآءً وَأَنزَلَ مِنَ ٱلسَّمَآءِ مَآءً فَأَخْرَجَ بِهِۦ مِنَ ٱلثَّمَرَٰتِ رِزْقًا لَّكُمْ فَلَا تَجْعَلُوا لِلَّهِ أَندَادًا وَأَنتُمْ تَعْلَمُونَ وَإِن كُنتُمْ فِى رَيْبٍ مِّمَّا نَزَّلْنَا عَلَىٰ عَبْدِنَا فَأْتُوا بِسُورَةٍ مِّن مِّثْلِهِۦ وَٱدْعُوا شُهَدَآءَكُم مِّن دُونِ ٱللَّهِ إِن كُنتُمْ صَٰدِقِينَ فَإِن لَّمْ تَفْعَلُوا وَلَن تَفْعَلُوا فَٱتَّقُوا ٱلنَّارَ ٱلَّتِى وَقُودُهَا ٱلنَّاسُ وَٱلْحِجَارَةُ أُعِدَّتْ لِلْكَٰفِرِينَ وَبَشِّرِ ٱلَّذِينَ ءَامَنُوا وَعَمِلُوا ٱلصَّٰلِحَٰتِ أَنَّ لَهُمْ جَنَّٰتٍ تَجْرِى مِن تَحْتِهَا ٱلْأَنْهَٰرُ`,
  baqara_p6: `وَإِذْ قَالَ رَبُّكَ لِلْمَلَٰٓئِكَةِ إِنِّى جَاعِلٌ فِى ٱلْأَرْضِ خَلِيفَةً قَالُوٓا أَتَجْعَلُ فِيهَا مَن يُفْسِدُ فِيهَا وَيَسْفِكُ ٱلدِّمَآءَ وَنَحْنُ نُسَبِّحُ بِحَمْدِكَ وَنُقَدِّسُ لَكَ قَالَ إِنِّىٓ أَعْلَمُ مَا لَا تَعْلَمُونَ وَعَلَّمَ ءَادَمَ ٱلْأَسْمَآءَ كُلَّهَا ثُمَّ عَرَضَهُمْ عَلَى ٱلْمَلَٰٓئِكَةِ فَقَالَ أَنۢبِـُٔونِى بِأَسْمَآءِ هَٰٓؤُلَآءِ إِن كُنتُمْ صَٰدِقِينَ قَالُوا سُبْحَٰنَكَ لَا عِلْمَ لَنَآ إِلَّا مَا عَلَّمْتَنَآ إِنَّكَ أَنتَ ٱلْعَلِيمُ ٱلْحَكِيمُ قَالَ يَٰٓـَٔادَمُ أَنۢبِئْهُم بِأَسْمَآئِهِمْ فَلَمَّآ أَنۢبَأَهُم بِأَسْمَآئِهِمْ قَالَ أَلَمْ أَقُل لَّكُمْ إِنِّىٓ أَعْلَمُ غَيْبَ ٱلسَّمَٰوَٰتِ وَٱلْأَرْضِ وَأَعْلَمُ مَا تُبْدُونَ وَمَا كُنتُمْ تَكْتُمُونَ`,
  baqara_p7: `إِنَّ ٱلَّذِينَ كَفَرُوا وَمَاتُوا وَهُمْ كُفَّارٌ أُوْلَٰٓئِكَ عَلَيْهِمْ لَعْنَةُ ٱللَّهِ وَٱلْمَلَٰٓئِكَةِ وَٱلنَّاسِ أَجْمَعِينَ خَٰلِدِينَ فِيهَا لَا يُخَفَّفُ عَنْهُمُ ٱلْعَذَابُ وَلَا هُمْ يُنظَرُونَ وَإِلَٰهُكُمْ إِلَٰهٌ وَٰحِدٌ لَّآ إِلَٰهَ إِلَّا هُوَ ٱلرَّحْمَٰنُ ٱلرَّحِيمُ إِنَّ فِى خَلْقِ ٱلسَّمَٰوَٰتِ وَٱلْأَرْضِ وَٱخْتِلَٰفِ ٱلَّيْلِ وَٱلنَّهَارِ وَٱلْفُلْكِ ٱلَّتِى تَجْرِى فِى ٱلْبَحْرِ بِمَا يَنفَعُ ٱلنَّاسَ وَمَآ أَنزَلَ ٱللَّهُ مِنَ ٱلسَّمَآءِ مِن مَّآءٍ فَأَحْيَا بِهِ ٱلْأَرْضَ بَعْدَ مَوْتِهَا وَبَثَّ فِيهَا مِن كُلِّ دَآبَّةٍ وَتَصْرِيفِ ٱلرِّيَٰحِ وَٱلسَّحَابِ ٱلْمُسَخَّرِ بَيْنَ ٱلسَّمَآءِ وَٱلْأَرْضِ لَءَايَٰتٍ لِّقَوْمٍ يَعْقِلُونَ`,
  baqara_p8: `يَٰٓأَيُّهَا ٱلنَّاسُ كُلُوا مِمَّا فِى ٱلْأَرْضِ حَلَٰلًا طَيِّبًا وَلَا تَتَّبِعُوا خُطُوَٰتِ ٱلشَّيْطَٰنِ إِنَّهُۥ لَكُمْ عَدُوٌّ مُّبِينٌ إِنَّمَا يَأْمُرُكُم بِٱلسُّوٓءِ وَٱلْفَحْشَآءِ وَأَن تَقُولُوا عَلَى ٱللَّهِ مَا لَا تَعْلَمُونَ وَإِذَا قِيلَ لَهُمُ ٱتَّبِعُوا مَآ أَنزَلَ ٱللَّهُ قَالُوا بَلْ نَتَّبِعُ مَآ أَلْفَيْنَا عَلَيْهِ ءَابَآءَنَآ أَوَلَوْ كَانَ ءَابَآؤُهُمْ لَا يَعْقِلُونَ شَيْـًٔا وَلَا يَهْتَدُونَ`,
  baqara_p9: `وَإِذْ قُلْنَا ٱدْخُلُوا هَٰذِهِ ٱلْقَرْيَةَ فَكُلُوا مِنْهَا حَيْثُ شِئْتُمْ رَغَدًا وَٱدْخُلُوا ٱلْبَابَ سُجَّدًا وَقُولُوا حِطَّةٌ نَّغْفِرْ لَكُمْ خَطَٰيَٰكُمْ وَسَنَزِيدُ ٱلْمُحْسِنِينَ فَبَدَّلَ ٱلَّذِينَ ظَلَمُوا قَوْلًا غَيْرَ ٱلَّذِى قِيلَ لَهُمْ فَأَنزَلْنَا عَلَى ٱلَّذِينَ ظَلَمُوا رِجْزًا مِّنَ ٱلسَّمَآءِ بِمَا كَانُوا يَفْسُقُونَ وَإِذِ ٱسْتَسْقَىٰ مُوسَىٰ لِقَوْمِهِۦ فَقُلْنَا ٱضْرِب بِّعَصَاكَ ٱلْحَجَرَ فَٱنفَجَرَتْ مِنْهُ ٱثْنَتَا عَشْرَةَ عَيْنًا قَدْ عَلِمَ كُلُّ أُنَاسٍ مَّشْرَبَهُمْ كُلُوا وَٱشْرَبُوا مِن رِّزْقِ ٱللَّهِ وَلَا تَعْثَوْا فِى ٱلْأَرْضِ مُفْسِدِينَ`,
  baqara_p42: `تِلْكَ ٱلرُّسُلُ فَضَّلْنَا بَعْضَهُمْ عَلَىٰ بَعْضٍ مِّنْهُم مَّن كَلَّمَ ٱللَّهُ وَرَفَعَ بَعْضَهُمْ دَرَجَٰتٍ وَءَاتَيْنَا عِيسَى ٱبْنَ مَرْيَمَ ٱلْبَيِّنَٰتِ وَأَيَّدْنَٰهُ بِرُوحِ ٱلْقُدُسِ وَلَوْ شَآءَ ٱللَّهُ مَا ٱقْتَتَلَ ٱلَّذِينَ مِنۢ بَعْدِهِم مِّنۢ بَعْدِ مَا جَآءَتْهُمُ ٱلْبَيِّنَٰتُ وَلَٰكِنِ ٱخْتَلَفُوا فَمِنْهُم مَّنْ ءَامَنَ وَمِنْهُم مَّن كَفَرَ وَلَوْ شَآءَ ٱللَّهُ مَا ٱقْتَتَلُوا وَلَٰكِنَّ ٱللَّهَ يَفْعَلُ مَا يُرِيدُ يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُوٓا أَنفِقُوا مِمَّا رَزَقْنَٰكُم مِّن قَبْلِ أَن يَأْتِىَ يَوْمٌ لَّا بَيْعٌ فِيهِ وَلَا خُلَّةٌ وَلَا شَفَٰعَةٌ وَٱلْكَٰفِرُونَ هُمُ ٱلظَّٰلِمُونَ ٱللَّهُ لَآ إِلَٰهَ إِلَّا هُوَ ٱلْحَىُّ ٱلْقَيُّومُ لَا تَأْخُذُهُۥ سِنَةٌ وَلَا نَوْمٌ لَّهُۥ مَا فِى ٱلسَّمَٰوَٰتِ وَمَا فِى ٱلْأَرْضِ مَن ذَا ٱلَّذِى يَشْفَعُ عِندَهُۥٓ إِلَّا بِإِذْنِهِۦ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ وَلَا يُحِيطُونَ بِشَىْءٍ مِّنْ عِلْمِهِۦٓ إِلَّا بِمَا شَآءَ وَسِعَ كُرْسِيُّهُ ٱلسَّمَٰوَٰتِ وَٱلْأَرْضَ وَلَا يَـُٔودُهُۥ حِفْظُهُمَا وَهُوَ ٱلْعَلِىُّ ٱلْعَظِيمُ لَآ إِكْرَاهَ فِى ٱلدِّينِ قَد تَّبَيَّنَ ٱلرُّشْدُ مِنَ ٱلْغَىِّ فَمَن يَكْفُرْ بِٱلطَّٰغُوتِ وَيُؤْمِنۢ بِٱللَّهِ فَقَدِ ٱسْتَمْسَكَ بِٱلْعُرْوَةِ ٱلْوُثْقَىٰ لَا ٱنفِصَامَ لَهَا وَٱللَّهُ سَمِيعٌ عَلِيمٌ`,
  baqara_p43: `وَإِذْ قُلْتُمْ يَٰمُوسَىٰ لَن نَّصْبِرَ عَلَىٰ طَعَامٍ وَٰحِدٍ فَٱدْعُ لَنَا رَبَّكَ يُخْرِجْ لَنَا مِمَّا تُنۢبِتُ ٱلْأَرْضُ مِنۢ بَقْلِهَا وَقِثَّآئِهَا وَفُومِهَا وَعَدَسِهَا وَبَصَلِهَا قَالَ أَتَسْتَبْدِلُونَ ٱلَّذِى هُوَ أَدْنَىٰ بِٱلَّذِى هُوَ خَيْرٌ ٱهْبِطُوا مِصْرًا فَإِنَّ لَكُم مَّا سَأَلْتُمْ وَضُرِبَتْ عَلَيْهِمُ ٱلذِّلَّةُ وَٱلْمَسْكَنَةُ وَبَآءُو بِغَضَبٍ مِّنَ ٱللَّهِ ذَٰلِكَ بِأَنَّهُمْ كَانُوا يَكْفُرُونَ بِـَٔايَٰتِ ٱللَّهِ وَيَقْتُلُونَ ٱلنَّبِيِّۦنَ بِغَيْرِ ٱلْحَقِّ ذَٰلِكَ بِمَا عَصَوا وَّكَانُوا يَعْتَدُونَ`,
  baqara_p44: `إِنَّ ٱلَّذِينَ ءَامَنُوا وَٱلَّذِينَ هَادُوا وَٱلنَّصَٰرَىٰ وَٱلصَّٰبِـِٔينَ مَنْ ءَامَنَ بِٱللَّهِ وَٱلْيَوْمِ ٱلْءَاخِرِ وَعَمِلَ صَٰلِحًا فَلَهُمْ أَجْرُهُمْ عِندَ رَبِّهِمْ وَلَا خَوْفٌ عَلَيْهِمْ وَلَا هُمْ يَحْزَنُونَ وَإِذْ أَخَذْنَا مِيثَٰقَكُمْ وَرَفَعْنَا فَوْقَكُمُ ٱلطُّورَ خُذُوا مَآ ءَاتَيْنَٰكُم بِقُوَّةٍ وَٱذْكُرُوا مَا فِيهِ لَعَلَّكُمْ تَتَّقُونَ`,
  baqara_p45: `وَلَقَدْ عَلِمْتُمُ ٱلَّذِينَ ٱعْتَدَوْا مِنكُمْ فِى ٱلسَّبْتِ فَقُلْنَا لَهُمْ كُونُوا قِرَدَةً خَٰسِـِٔينَ فَجَعَلْنَٰهَا نَكَٰلًا لِّمَا بَيْنَ يَدَيْهَا وَمَا خَلْفَهَا وَمَوْعِظَةً لِّلْمُتَّقِينَ وَإِذْ قَالَ مُوسَىٰ لِقَوْمِهِۦٓ إِنَّ ٱللَّهَ يَأْمُرُكُمْ أَن تَذْبَحُوا بَقَرَةً قَالُوٓا أَتَتَّخِذُنَا هُزُوًا قَالَ أَعُوذُ بِٱللَّهِ أَنْ أَكُونَ مِنَ ٱلْجَٰهِلِينَ`,
  baqara_p46: `وَإِذْ قَتَلْتُمْ نَفْسًا فَٱدَّٰرَٰتُمْ فِيهَا وَٱللَّهُ مُخْرِجٌ مَّا كُنتُمْ تَكْتُمُونَ فَقُلْنَا ٱضْرِبُوهُ بِبَعْضِهَا كَذَٰلِكَ يُحْىِ ٱللَّهُ ٱلْمَوْتَىٰ وَيُرِيكُمْ ءَايَٰتِهِۦ لَعَلَّكُمْ تَعْقِلُونَ ثُمَّ قَسَتْ قُلُوبُكُم مِّنۢ بَعْدِ ذَٰلِكَ فَهِىَ كَٱلْحِجَارَةِ أَوْ أَشَدُّ قَسْوَةً وَإِنَّ مِنَ ٱلْحِجَارَةِ لَمَا يَتَفَجَّرُ مِنْهُ ٱلْأَنْهَٰرُ وَإِنَّ مِنْهَا لَمَا يَشَّقَّقُ فَيَخْرُجُ مِنْهُ ٱلْمَآءُ وَإِنَّ مِنْهَا لَمَا يَهْبِطُ مِنْ خَشْيَةِ ٱللَّهِ وَمَا ٱللَّهُ بِغَٰفِلٍ عَمَّا تَعْمَلُونَ`,
  baqara_p47: `أَفَتَطْمَعُونَ أَن يُؤْمِنُوا لَكُمْ وَقَدْ كَانَ فَرِيقٌ مِّنْهُمْ يَسْمَعُونَ كَلَٰمَ ٱللَّهِ ثُمَّ يُحَرِّفُونَهُۥ مِنۢ بَعْدِ مَا عَقَلُوهُ وَهُمْ يَعْلَمُونَ وَإِذَا لَقُوا ٱلَّذِينَ ءَامَنُوا قَالُوٓا ءَامَنَّا وَإِذَا خَلَا بَعْضُهُمْ إِلَىٰ بَعْضٍ قَالُوٓا أَتُحَدِّثُونَهُم بِمَا فَتَحَ ٱللَّهُ عَلَيْكُمْ لِيُحَآجُّوكُم بِهِۦ عِندَ رَبِّكُمْ أَفَلَا تَعْقِلُونَ`,
  baqara_p48: `وَقَالُوا لَن تَمَسَّنَا ٱلنَّارُ إِلَّآ أَيَّامًا مَّعْدُودَةً قُلْ أَتَّخَذْتُمْ عِندَ ٱللَّهِ عَهْدًا فَلَن يُخْلِفَ ٱللَّهُ عَهْدَهُۥٓ أَمْ تَقُولُونَ عَلَى ٱللَّهِ مَا لَا تَعْلَمُونَ بَلَىٰ مَن كَسَبَ سَيِّئَةً وَأَحَٰطَتْ بِهِۦ خَطِيٓـَٔتُهُۥ فَأُوْلَٰٓئِكَ أَصْحَٰبُ ٱلنَّارِ هُمْ فِيهَا خَٰلِدُونَ وَٱلَّذِينَ ءَامَنُوا وَعَمِلُوا ٱلصَّٰلِحَٰتِ أُوْلَٰٓئِكَ أَصْحَٰبُ ٱلْجَنَّةِ هُمْ فِيهَا خَٰلِدُونَ`,
  baqara_p49: `وَإِن كُنتُمْ عَلَىٰ سَفَرٍ وَلَمْ تَجِدُوا كَاتِبًا فَرِهَٰنٌ مَّقْبُوضَةٌ فَإِنْ أَمِنَ بَعْضُكُم بَعْضًا فَلْيُؤَدِّ ٱلَّذِى ٱؤْتُمِنَ أَمَٰنَتَهُۥ وَلْيَتَّقِ ٱللَّهَ رَبَّهُۥ وَلَا تَكْتُمُوا ٱلشَّهَٰدَةَ وَمَن يَكْتُمْهَا فَإِنَّهُۥٓ ءَاثِمٌ قَلْبُهُۥ وَٱللَّهُ بِمَا تَعْمَلُونَ عَلِيمٌ لِلَّهِ مَا فِى ٱلسَّمَٰوَٰتِ وَمَا فِى ٱلْأَرْضِ وَإِن تُبْدُوا مَا فِىٓ أَنفُسِكُمْ أَوْ تُخْفُوهُ يُحَاسِبْكُم بِهِ ٱللَّهُ فَيَغْفِرُ لِمَن يَشَآءُ وَيُعَذِّبُ مَن يَشَآءُ وَٱللَّهُ عَلَىٰ كُلِّ شَىْءٍ قَدِيرٌ ءَامَنَ ٱلرَّسُولُ بِمَآ أُنزِلَ إِلَيْهِ مِن رَّبِّهِۦ وَٱلْمُؤْمِنُونَ كُلٌّ ءَامَنَ بِٱللَّهِ وَمَلَٰٓئِكَتِهِۦ وَكُتُبِهِۦ وَرُسُلِهِۦ لَا نُفَرِّقُ بَيْنَ أَحَدٍ مِّن رُّسُلِهِۦ وَقَالُوا سَمِعْنَا وَأَطَعْنَا غُفْرَانَكَ رَبَّنَا وَإِلَيْكَ ٱلْمَصِيرُ لَا يُكَلِّفُ ٱللَّهُ نَفْسًا إِلَّا وُسْعَهَا لَهَا مَا كَسَبَتْ وَعَلَيْهَا مَا ٱكْتَسَبَتْ رَبَّنَا لَا تُؤَاخِذْنَآ إِن نَّسِينَآ أَوْ أَخْطَأْنَا رَبَّنَا وَلَا تَحْمِلْ عَلَيْنَآ إِصْرًا كَمَا حَمَلْتَهُۥ عَلَى ٱلَّذِينَ مِن قَبْلِنَا رَبَّنَا وَلَا تُحَمِّلْنَا مَا لَا طَاقَةَ لَنَا بِهِۦ وَٱعْفُ عَنَّا وَٱغْفِرْ لَنَا وَٱرْحَمْنَآ أَنتَ مَوْلَىٰنَا فَٱنصُرْنَا عَلَى ٱلْقَوْمِ ٱلْكَٰفِرِينَ`,
  annaba: `عَمَّ يَتَسَآءَلُونَ عَنِ ٱلنَّبَإِ ٱلْعَظِيمِ ٱلَّذِى هُمْ فِيهِ مُخْتَلِفُونَ كَلَّا سَيَعْلَمُونَ ثُمَّ كَلَّا سَيَعْلَمُونَ أَلَمْ نَجْعَلِ ٱلْأَرْضَ مِهَٰدًا وَٱلْجِبَالَ أَوْتَادًا وَخَلَقْنَٰكُمْ أَزْوَٰجًا وَجَعَلْنَا نَوْمَكُمْ سُبَاتًا وَجَعَلْنَا ٱلَّيْلَ لِبَاسًا وَجَعَلْنَا ٱلنَّهَارَ مَعَاشًا وَبَنَيْنَا فَوْقَكُمْ سَبْعًا شِدَادًا وَجَعَلْنَا سِرَاجًا وَهَّاجًا وَأَنزَلْنَا مِنَ ٱلْمُعْصِرَٰتِ مَآءً ثَجَّاجًا لِّنُخْرِجَ بِهِۦ حَبًّا وَنَبَاتًا وَجَنَّٰتٍ أَلْفَافًا إِنَّ يَوْمَ ٱلْفَصْلِ كَانَ مِيقَٰتًا يَوْمَ يُنفَخُ فِى ٱلصُّورِ فَتَأْتُونَ أَفْوَاجًا وَفُتِحَتِ ٱلسَّمَآءُ فَكَانَتْ أَبْوَٰبًا وَسُيِّرَتِ ٱلْجِبَالُ فَكَانَتْ سَرَابًا إِنَّ جَهَنَّمَ كَانَتْ مِرْصَادًا لِّلطَّٰغِينَ مَـَٔابًا لَّٰبِثِينَ فِيهَآ أَحْقَابًا لَّا يَذُوقُونَ فِيهَا بَرْدًا وَلَا شَرَابًا إِلَّا حَمِيمًا وَغَسَّاقًا جَزَآءً وِفَاقًا إِنَّهُمْ كَانُوا لَا يَرْجُونَ حِسَابًا وَكَذَّبُوا بِـَٔايَٰتِنَا كِذَّابًا وَكُلَّ شَىْءٍ أَحْصَيْنَٰهُ كِتَٰبًا فَذُوقُوا فَلَن نَّزِيدَكُمْ إِلَّا عَذَابًا إِنَّ لِلْمُتَّقِينَ مَفَازًا حَدَآئِقَ وَأَعْنَٰبًا وَكَوَاعِبَ أَتْرَابًا وَكَأْسًا دِهَاقًا لَّا يَسْمَعُونَ فِيهَا لَغْوًا وَلَا كِذَّٰبًا جَزَآءً مِّن رَّبِّكَ عَطَآءً حِسَابًا رَّبِّ ٱلسَّمَٰوَٰتِ وَٱلْأَرْضِ وَمَا بَيْنَهُمَا ٱلرَّحْمَٰنِ لَا يَمْلِكُونَ مِنْهُ خِطَابًا يَوْمَ يَقُومُ ٱلرُّوحُ وَٱلْمَلَٰٓئِكَةُ صَفًّا لَّا يَتَكَلَّمُونَ إِلَّا مَنْ أَذِنَ لَهُ ٱلرَّحْمَٰنُ وَقَالَ صَوَابًا ذَٰلِكَ ٱلْيَوْمُ ٱلْحَقُّ فَمَن شَآءَ ٱتَّخَذَ إِلَىٰ رَبِّهِۦ مَـَٔابًا إِنَّآ أَنذَرْنَٰكُمْ عَذَابًا قَرِيبًا يَوْمَ يَنظُرُ ٱلْمَرْءُ مَا قَدَّمَتْ يَدَاهُ وَيَقُولُ ٱلْكَافِرُ يَٰلَيْتَنِى كُنتُ تُرَٰبًا`,
  annaziat: `وَٱلنَّٰزِعَٰتِ غَرْقًا وَٱلنَّٰشِطَٰتِ نَشْطًا وَٱلسَّٰبِحَٰتِ سَبْحًا فَٱلسَّٰبِقَٰتِ سَبْقًا فَٱلْمُدَبِّرَٰتِ أَمْرًا يَوْمَ تَرْجُفُ ٱلرَّاجِفَةُ تَتْبَعُهَا ٱلرَّادِفَةُ قُلُوبٌ يَوْمَئِذٍ وَاجِفَةٌ أَبْصَٰرُهَا خَٰشِعَةٌ يَقُولُونَ أَءِنَّا لَمَرْدُودُونَ فِى ٱلْحَافِرَةِ أَءِذَا كُنَّا عِظَٰمًا نَّخِرَةً قَالُوا تِلْكَ إِذًا كَرَّةٌ خَاسِرَةٌ فَإِنَّمَا هِىَ زَجْرَةٌ وَٰحِدَةٌ فَإِذَا هُم بِٱلسَّاهِرَةِ هَلْ أَتَىٰكَ حَدِيثُ مُوسَىٰ إِذْ نَادَىٰهُ رَبُّهُۥ بِٱلْوَادِ ٱلْمُقَدَّسِ طُوًى ٱذْهَبْ إِلَىٰ فِرْعَوْنَ إِنَّهُۥ طَغَىٰ فَقُلْ هَل لَّكَ إِلَىٰٓ أَن تَزَكَّىٰ وَأَهْدِيَكَ إِلَىٰ رَبِّكَ فَتَخْشَىٰ فَأَرَىٰهُ ٱلْءَايَةَ ٱلْكُبْرَىٰ فَكَذَّبَ وَعَصَىٰ ثُمَّ أَدْبَرَ يَسْعَىٰ فَحَشَرَ فَنَادَىٰ فَقَالَ أَنَا۠ رَبُّكُمُ ٱلْأَعْلَىٰ فَأَخَذَهُ ٱللَّهُ نَكَالَ ٱلْءَاخِرَةِ وَٱلْأُولَىٰ إِنَّ فِى ذَٰلِكَ لَعِبْرَةً لِّمَن يَخْشَىٰ ءَأَنتُمْ أَشَدُّ خَلْقًا أَمِ ٱلسَّمَآءُ بَنَٰهَا رَفَعَ سَمْكَهَا فَسَوَّىٰهَا وَأَغْطَشَ لَيْلَهَا وَأَخْرَجَ ضُحَٰهَا وَٱلْأَرْضَ بَعْدَ ذَٰلِكَ دَحَٰهَا أَخْرَجَ مِنْهَا مَآءَهَا وَمَرْعَٰهَا وَٱلْجِبَالَ أَرْسَٰهَا مَتَٰعًا لَّكُمْ وَلِأَنْعَٰمِكُمْ فَإِذَا جَآءَتِ ٱلطَّآمَّةُ ٱلْكُبْرَىٰ يَوْمَ يَتَذَكَّرُ ٱلْإِنسَٰنُ مَا سَعَىٰ وَبُرِّزَتِ ٱلْجَحِيمُ لِمَن يَرَىٰ فَأَمَّا مَن طَغَىٰ وَءَاثَرَ ٱلْحَيَوٰةَ ٱلدُّنْيَا فَإِنَّ ٱلْجَحِيمَ هِىَ ٱلْمَأْوَىٰ وَأَمَّا مَنْ خَافَ مَقَامَ رَبِّهِۦ وَنَهَى ٱلنَّفْسَ عَنِ ٱلْهَوَىٰ فَإِنَّ ٱلْجَنَّةَ هِىَ ٱلْمَأْوَىٰ يَسْـَٔلُونَكَ عَنِ ٱلسَّاعَةِ أَيَّانَ مُرْسَٰهَا فِيمَ أَنتَ مِن ذِكْرَٰهَآ إِلَىٰ رَبِّكَ مُنتَهَٰهَآ إِنَّمَآ أَنتَ مُنذِرُ مَن يَخْشَٰهَا كَأَنَّهُمْ يَوْمَ يَرَوْنَهَا لَمْ يَلْبَثُوٓا إِلَّا عَشِيَّةً أَوْ ضُحَٰهَا`,
  attakwir: `إِذَا ٱلشَّمْسُ كُوِّرَتْ وَإِذَا ٱلنُّجُومُ ٱنكَدَرَتْ وَإِذَا ٱلْجِبَالُ سُيِّرَتْ وَإِذَا ٱلْعِشَارُ عُطِّلَتْ وَإِذَا ٱلْوُحُوشُ حُشِرَتْ وَإِذَا ٱلْبِحَارُ سُجِّرَتْ وَإِذَا ٱلنُّفُوسُ زُوِّجَتْ وَإِذَا ٱلْمَوْءُۥدَةُ سُئِلَتْ بِأَىِّ ذَنۢبٍ قُتِلَتْ وَإِذَا ٱلصُّحُفُ نُشِرَتْ وَإِذَا ٱلسَّمَآءُ كُشِطَتْ وَإِذَا ٱلْجَحِيمُ سُعِّرَتْ وَإِذَا ٱلْجَنَّةُ أُزْلِفَتْ عَلِمَتْ نَفْسٌ مَّآ أَحْضَرَتْ فَلَآ أُقْسِمُ بِٱلْخُنَّسِ ٱلْجَوَارِ ٱلْكُنَّسِ وَٱلَّيْلِ إِذَا عَسْعَسَ وَٱلصُّبْحِ إِذَا تَنَفَّسَ إِنَّهُۥ لَقَوْلُ رَسُولٍ كَرِيمٍ ذِى قُوَّةٍ عِندَ ذِى ٱلْعَرْشِ مَكِينٍ مُّطَاعٍ ثَمَّ أَمِينٍ وَمَا صَاحِبُكُم بِمَجْنُونٍ وَلَقَدْ رَءَاهُ بِٱلْأُفُقِ ٱلْمُبِينِ وَمَا هُوَ عَلَى ٱلْغَيْبِ بِضَنِينٍ وَمَا هُوَ بِقَوْلِ شَيْطَٰنٍ رَّجِيمٍ فَأَيْنَ تَذْهَبُونَ إِنْ هُوَ إِلَّا ذِكْرٌ لِّلْعَٰلَمِينَ لِمَن شَآءَ مِنكُمْ أَن يَسْتَقِيمَ وَمَا تَشَآءُونَ إِلَّآ أَن يَشَآءَ ٱللَّهُ رَبُّ ٱلْعَٰلَمِينَ`,
  abasa: `عَبَسَ وَتَوَلَّىٰٓ أَن جَآءَهُ ٱلْأَعْمَىٰ وَمَا يُدْرِيكَ لَعَلَّهُۥ يَزَّكَّىٰٓ أَوْ يَذَّكَّرُ فَتَنفَعَهُ ٱلذِّكْرَىٰ أَمَّا مَنِ ٱسْتَغْنَىٰ فَأَنتَ لَهُۥ تَصَدَّىٰ وَمَا عَلَيْكَ أَلَّا يَزَّكَّىٰ وَأَمَّا مَن جَآءَكَ يَسْعَىٰ وَهُوَ يَخْشَىٰ فَأَنتَ عَنْهُ تَلَهَّىٰ كَلَّآ إِنَّهَا تَذْكِرَةٌ فَمَن شَآءَ ذَكَرَهُۥ فِى صُحُفٍ مُّكَرَّمَةٍ مَّرْفُوعَةٍ مُّطَهَّرَةٍ بِأَيْدِى سَفَرَةٍ كِرَامٍ بَرَرَةٍ قُتِلَ ٱلْإِنسَٰنُ مَآ أَكْفَرَهُۥ مِنْ أَىِّ شَىْءٍ خَلَقَهُۥ مِن نُّطْفَةٍ خَلَقَهُۥ فَقَدَّرَهُۥ ثُمَّ ٱلسَّبِيلَ يَسَّرَهُۥ ثُمَّ أَمَاتَهُۥ فَأَقْبَرَهُۥ ثُمَّ إِذَا شَآءَ أَنشَرَهُۥ كَلَّا لَمَّا يَقْضِ مَآ أَمَرَهُۥ فَلْيَنظُرِ ٱلْإِنسَٰنُ إِلَىٰ طَعَامِهِۦٓ أَنَّا صَبَبْنَا ٱلْمَآءَ صَبًّا ثُمَّ شَقَقْنَا ٱلْأَرْضَ شَقًّا فَأَنبَتْنَا فِيهَا حَبًّا وَعِنَبًا وَقَضْبًا وَزَيْتُونًا وَنَخْلًا وَحَدَآئِقَ غُلْبًا وَفَٰكِهَةً وَأَبًّا مَّتَٰعًا لَّكُمْ وَلِأَنْعَٰمِكُمْ فَإِذَا جَآءَتِ ٱلصَّآخَّةُ يَوْمَ يَفِرُّ ٱلْمَرْءُ مِنْ أَخِيهِ وَأُمِّهِۦ وَأَبِيهِ وَصَٰحِبَتِهِۦ وَبَنِيهِ لِكُلِّ ٱمْرِئٍ مِّنْهُمْ يَوْمَئِذٍ شَأْنٌ يُغْنِيهِ وُجُوهٌ يَوْمَئِذٍ مُّسْفِرَةٌ ضَاحِكَةٌ مُّسْتَبْشِرَةٌ وَوُجُوهٌ يَوْمَئِذٍ عَلَيْهَا غَبَرَةٌ تَرْهَقُهَا قَتَرَةٌ أُوْلَٰٓئِكَ هُمُ ٱلْكَفَرَةُ ٱلْفَجَرَةُ`,
  alinfitar: `إِذَا ٱلسَّمَآءُ ٱنفَطَرَتْ وَإِذَا ٱلْكَوَاكِبُ ٱنتَثَرَتْ وَإِذَا ٱلْبِحَارُ فُجِّرَتْ وَإِذَا ٱلْقُبُورُ بُعْثِرَتْ عَلِمَتْ نَفْسٌ مَّا قَدَّمَتْ وَأَخَّرَتْ يَٰٓأَيُّهَا ٱلْإِنسَٰنُ مَا غَرَّكَ بِرَبِّكَ ٱلْكَرِيمِ ٱلَّذِى خَلَقَكَ فَسَوَّىٰكَ فَعَدَلَكَ فِىٓ أَىِّ صُورَةٍ مَّا شَآءَ رَكَّبَكَ كَلَّا بَلْ تُكَذِّبُونَ بِٱلدِّينِ وَإِنَّ عَلَيْكُمْ لَحَٰفِظِينَ كِرَامًا كَٰتِبِينَ يَعْلَمُونَ مَا تَفْعَلُونَ إِنَّ ٱلْأَبْرَارَ لَفِى نَعِيمٍ وَإِنَّ ٱلْفُجَّارَ لَفِى جَحِيمٍ يَصْلَوْنَهَا يَوْمَ ٱلدِّينِ وَمَا هُمْ عَنْهَا بِغَآئِبِينَ وَمَآ أَدْرَىٰكَ مَا يَوْمُ ٱلدِّينِ ثُمَّ مَآ أَدْرَىٰكَ مَا يَوْمُ ٱلدِّينِ يَوْمَ لَا تَمْلِكُ نَفْسٌ لِّنَفْسٍ شَيْـًٔا وَٱلْأَمْرُ يَوْمَئِذٍ لِّلَّهِ`,
  almutaffifin: `وَيْلٌ لِّلْمُطَفِّفِينَ ٱلَّذِينَ إِذَا ٱكْتَالُوا۟ عَلَى ٱلنَّاسِ يَسْتَوْفُونَ وَإِذَا كَالُوهُمْ أَو وَّزَنُوهُمْ يُخْسِرُونَ أَلَا يَظُنُّ أُو۟لَٰٓئِكَ أَنَّهُم مَّبْعُوثُونَ لِيَوْمٍ عَظِيمٍ يَوْمَ يَقُومُ ٱلنَّاسُ لِرَبِّ ٱلْعَٰلَمِينَ كَلَّآ إِنَّ كِتَٰبَ ٱلْفُجَّارِ لَفِى سِجِّينٍ وَمَآ أَدْرَىٰكَ مَا سِجِّينٌ كِتَٰبٌ مَّرْقُومٌ وَيْلٌ يَوْمَئِذٍ لِّلْمُكَذِّبِينَ ٱلَّذِينَ يُكَذِّبُونَ بِيَوْمِ ٱلدِّينِ وَمَا يُكَذِّبُ بِهِۦٓ إِلَّا كُلُّ مُعْتَدٍ أَثِيمٍ إِذَا تُتْلَىٰ عَلَيْهِ ءَايَٰتُنَا قَالَ أَسَٰطِيرُ ٱلْأَوَّلِينَ كَلَّا بَلْ رَانَ عَلَىٰ قُلُوبِهِم مَّا كَانُوا۟ يَكْسِبُونَ كَلَّآ إِنَّهُمْ عَن رَّبِّهِمْ يَوْمَئِذٍ لَّمَحْجُوبُونَ ثُمَّ إِنَّهُمْ لَصَالُوا۟ ٱلْجَحِيمِ ثُمَّ يُقَالُ هَٰذَا ٱلَّذِى كُنتُم بِهِۦ تُكَذِّبُونَ كَلَّآ إِنَّ كِتَٰبَ ٱلْأَبْرَارِ لَفِى عِلِّيِّينَ وَمَآ أَدْرَىٰكَ مَا عِلِّيُّونَ كِتَٰبٌ مَّرْقُومٌ يَشْهَدُهُ ٱلْمُقَرَّبُونَ إِنَّ ٱلْأَبْرَارَ لَفِى نَعِيمٍ عَلَى ٱلْأَرَآئِكِ يَنظُرُونَ تَعْرِفُ فِى وُجُوهِهِمْ نَضْرَةَ ٱلنَّعِيمِ يُسْقَوْنَ مِن رَّحِيقٍ مَّخْتُومٍ خِتَٰمُهُۥ مِسْكٌ وَفِى ذَٰلِكَ فَلْيَتَنَافَسِ ٱلْمُتَنَٰفِسُونَ وَمِزَاجُهُۥ مِن تَسْنِيمٍ عَيْنًا يَشْرَبُ بِهَا ٱلْمُقَرَّبُونَ إِنَّ ٱلَّذِينَ أَجْرَمُوا۟ كَانُوا۟ مِنَ ٱلَّذِينَ ءَامَنُوا۟ يَضْحَكُونَ وَإِذَا مَرُّوا۟ بِهِمْ يَتَغَامَزُونَ وَإِذَا ٱنقَلَبُوٓا۟ إِلَىٰٓ أَهْلِهِمُ ٱنقَلَبُوا۟ فَكِهِينَ وَإِذَا رَأَوْهُمْ قَالُوٓا۟ إِنَّ هَٰٓؤُلَآءِ لَضَآلُّونَ وَمَآ أُرْسِلُوا۟ عَلَيْهِمْ حَٰفِظِينَ فَٱلْيَوْمَ ٱلَّذِينَ ءَامَنُوا۟ مِنَ ٱلْكُفَّارِ يَضْحَكُونَ عَلَى ٱلْأَرَآئِكِ يَنظُرُونَ هَلْ ثُوِّبَ ٱلْكُفَّارُ مَا كَانُوا۟ يَفْعَلُونَ`,
  alinshiqaq: `إِذَا ٱلسَّمَآءُ ٱنشَقَّتْ وَأَذِنَتْ لِرَبِّهَا وَحُقَّتْ وَإِذَا ٱلْأَرْضُ مُدَّتْ وَأَلْقَتْ مَا فِيهَا وَتَخَلَّتْ وَأَذِنَتْ لِرَبِّهَا وَحُقَّتْ يَٰٓأَيُّهَا ٱلْإِنسَٰنُ إِنَّكَ كَادِحٌ إِلَىٰ رَبِّكَ كَدْحًا فَمُلَٰقِيهِ فَأَمَّا مَنْ أُوتِىَ كِتَٰبَهُۥ بِيَمِينِهِۦ فَسَوْفَ يُحَاسَبُ حِسَابًا يَسِيرًا وَيَنقَلِبُ إِلَىٰٓ أَهْلِهِۦ مَسْرُورًا وَأَمَّا مَنْ أُوتِىَ كِتَٰبَهُۥ وَرَآءَ ظَهْرِهِۦ فَسَوْفَ يَدْعُوا۟ ثُبُورًا وَيَصْلَىٰ سَعِيرًا إِنَّهُۥ كَانَ فِىٓ أَهْلِهِۦ مَسْرُورًا إِنَّهُۥ ظَنَّ أَن لَّن يَحُورَ بَلَىٰٓ إِنَّ رَبَّهُۥ كَانَ بِهِۦ بَصِيرًا فَلَآ أُقْسِمُ بِٱلشَّفَقِ وَٱلَّيْلِ وَمَا وَسَقَ وَٱلْقَمَرِ إِذَا ٱتَّسَقَ لَتَرْكَبُنَّ طَبَقًا عَن طَبَقٍ فَمَا لَهُمْ لَا يُؤْمِنُونَ وَإِذَا قُرِئَ عَلَيْهِمُ ٱلْقُرْءَانُ لَا يَسْجُدُونَ بَلِ ٱلَّذِينَ كَفَرُوا۟ يُكَذِّبُونَ وَٱللَّهُ أَعْلَمُ بِمَا يُوعُونَ فَبَشِّرْهُم بِعَذَابٍ أَلِيمٍ إِلَّا ٱلَّذِينَ ءَامَنُوا۟ وَعَمِلُوا۟ ٱلصَّٰلِحَٰتِ لَهُمْ أَجْرٌ غَيْرُ مَمْنُونٍ`,
  alburuj: `وَٱلسَّمَآءِ ذَاتِ ٱلْبُرُوجِ وَٱلْيَوْمِ ٱلْمَوْعُودِ وَشَاهِدٍ وَمَشْهُودٍ قُتِلَ أَصْحَٰبُ ٱلْأُخْدُودِ ٱلنَّارِ ذَاتِ ٱلْوَقُودِ إِذْ هُمْ عَلَيْهَا قُعُودٌ وَهُمْ عَلَىٰ مَا يَفْعَلُونَ بِٱلْمُؤْمِنِينَ شُهُودٌ وَمَا نَقَمُوا۟ مِنْهُمْ إِلَّآ أَن يُؤْمِنُوا۟ بِٱللَّهِ ٱلْعَزِيزِ ٱلْحَمِيدِ ٱلَّذِى لَهُۥ مُلْكُ ٱلسَّمَٰوَٰتِ وَٱلْأَرْضِ وَٱللَّهُ عَلَىٰ كُلِّ شَىْءٍ شَهِيدٌ إِنَّ ٱلَّذِينَ فَتَنُوا۟ ٱلْمُؤْمِنِينَ وَٱلْمُؤْمِنَٰتِ ثُمَّ لَمْ يَتُوبُوا۟ فَلَهُمْ عَذَابُ جَهَنَّمَ وَلَهُمْ عَذَابُ ٱلْحَرِيقِ إِنَّ ٱلَّذِينَ ءَامَنُوا۟ وَعَمِلُوا۟ ٱلصَّٰلِحَٰتِ لَهُمْ جَنَّٰتٌ تَجْرِى مِن تَحْتِهَا ٱلْأَنْهَٰرُ ذَٰلِكَ ٱلْفَوْزُ ٱلْكَبِيرُ إِنَّ بَطْشَ رَبِّكَ لَشَدِيدٌ إِنَّهُۥ هُوَ يُبْدِئُ وَيُعِيدُ وَهُوَ ٱلْغَفُورُ ٱلْوَدُودُ ذُو ٱلْعَرْشِ ٱلْمَجِيدُ فَعَّالٌ لِّمَا يُرِيدُ هَلْ أَتَىٰكَ حَدِيثُ ٱلْجُنُودِ فِرْعَوْنَ وَثَمُودَ بَلِ ٱلَّذِينَ كَفَرُوا۟ فِى تَكْذِيبٍ وَٱللَّهُ مِن وَرَآئِهِم مُّحِيطٌ بَلْ هُوَ قُرْءَانٌ مَّجِيدٌ فِى لَوْحٍ مَّحْفُوظٍ`,
  altariq: `وَٱلسَّمَآءِ وَٱلطَّارِقِ وَمَآ أَدْرَىٰكَ مَا ٱلطَّارِقُ ٱلنَّجْمُ ٱلثَّاقِبُ إِن كُلُّ نَفْسٍ لَّمَّا عَلَيْهَا حَافِظٌ فَلْيَنظُرِ ٱلْإِنسَٰنُ مِمَّ خُلِقَ خُلِقَ مِن مَّآءٍ دَافِقٍ يَخْرُجُ مِنۢ بَيْنِ ٱلصُّلْبِ وَٱلتَّرَآئِبِ إِنَّهُۥ عَلَىٰ رَجْعِهِۦ لَقَادِرٌ يَوْمَ تُبْلَى ٱلسَّرَآئِرُ فَمَا لَهُۥ مِن قُوَّةٍ وَلَا نَاصِرٍ وَٱلسَّمَآءِ ذَاتِ ٱلرَّجْعِ وَٱلْأَرْضِ ذَاتِ ٱلصَّدْعِ إِنَّهُۥ لَقَوْلٌ فَصْلٌ وَمَا هُوَ بِٱلْهَزْلِ إِنَّهُمْ يَكِيدُونَ كَيْدًا وَأَكِيدُ كَيْدًا فَمَهِّلِ ٱلْكَٰفِرِينَ أَمْهِلْهُمْ رُوَيْدًا`,
  alaala: `سَبِّحِ ٱسْمَ رَبِّكَ ٱلْأَعْلَى ٱلَّذِى خَلَقَ فَسَوَّىٰ وَٱلَّذِى قَدَّرَ فَهَدَىٰ وَٱلَّذِىٓ أَخْرَجَ ٱلْمَرْعَىٰ فَجَعَلَهُۥ غُثَآءً أَحْوَىٰ سَنُقْرِئُكَ فَلَا تَنسَىٰ إِلَّا مَا شَآءَ ٱللَّهُ إِنَّهُۥ يَعْلَمُ ٱلْجَهْرَ وَمَا يَخْفَىٰ وَنُيَسِّرُكَ لِلْيُسْرَىٰ فَذَكِّرْ إِن نَّفَعَتِ ٱلذِّكْرَىٰ سَيَذَّكَّرُ مَن يَخْشَىٰ وَيَتَجَنَّبُهَا ٱلْأَشْقَى ٱلَّذِى يَصْلَى ٱلنَّارَ ٱلْكُبْرَىٰ ثُمَّ لَا يَمُوتُ فِيهَا وَلَا يَحْيَىٰ قَدْ أَفْلَحَ مَن تَزَكَّىٰ وَذَكَرَ ٱسْمَ رَبِّهِۦ فَصَلَّىٰ بَلْ تُؤْثِرُونَ ٱلْحَيَوٰةَ ٱلدُّنْيَا وَٱلْءَاخِرَةُ خَيْرٌ وَأَبْقَىٰ إِنَّ هَٰذَا لَفِى ٱلصُّحُفِ ٱلْأُولَىٰ صُحُفِ إِبْرَٰهِيمَ وَمُوسَىٰ`,
  alfajr: `وَٱلۡفَجۡرِ وَلَيَالٍ عَشۡرٍ وَٱلشَّفۡعِ وَٱلۡوَتۡرِ وَٱلَّيۡلِ إِذَا يَسۡرِ هَلۡ فِي ذَٰلِكَ قَسَمٌ لِّذِي حِجۡرٍ أَلَمۡ تَرَ كَيۡفَ فَعَلَ رَبُّكَ بِعَادٍ إِرَمَ ذَاتِ ٱلۡعِمَادِ ٱلَّتِي لَمۡ يُخۡلَقۡ مِثۡلُهَا فِي ٱلۡبِلَٰدِ وَثَمُودَ ٱلَّذِينَ جَابُواْ ٱلصَّخۡرَ بِٱلۡوَادِ وَفِرۡعَوۡنَ ذِي ٱلۡأَوۡتَادِ ٱلَّذِينَ طَغَوۡاْ فِي ٱلۡبِلَٰدِ فَأَكۡثَرُواْ فِيهَا ٱلۡفَسَادَ فَصَبَّ عَلَيۡهِمۡ رَبُّكَ سَوۡطَ عَذَابٍ إِنَّ رَبَّكَ لَبِٱلۡمِرۡصَادِ فَأَمَّا ٱلۡإِنسَٰنُ إِذَا مَا ٱبۡتَلَٰىٰهُ رَبُّهُۥ فَأَكۡرَمَهُۥ وَنَعَّمَهُۥ فَيَقُولُ رَبِّيٓ أَكۡرَمَنِ وَأَمَّآ إِذَا مَا ٱبۡتَلَٰىٰهُ فَقَدَرَ عَلَيۡهِ رِزۡقَهُۥ فَيَقُولُ رَبِّيٓ أَهَٰنَنِ كَلَّاۖ بَل لَّا تُكۡرِمُونَ ٱلۡيَتِيمَ وَلَا تَحَٰٓضُّونَ عَلَىٰ طَعَامِ ٱلۡمِسۡكِينِ وَتَأۡكُلُونَ ٱلتُّرَاثَ أَكۡلٗا لَّمّٗا وَتُحِبُّونَ ٱلۡمَالَ حُبّٗا جَمّٗا كَلَّآ إِذَا دُكَّتِ ٱلۡأَرۡضُ دَكّٗا دَكّٗا وَجَآءَ رَبُّكَ وَٱلۡمَلَكُ صَفّٗا صَفّٗا وَجِاْيٓءَ يَوۡمَئِذِۭ بِجَهَنَّمَ يَوۡمَئِذٖ يَتَذَكَّرُ ٱلۡإِنسَٰنُ وَأَنَّىٰ لَهُ ٱلذِّكۡرَىٰ يَقُولُ يَٰلَيۡتَنِي قَدَّمۡتُ لِحَيَاتِي فَيَوۡمَئِذٖ لَّا يُعَذِّبُ عَذَابَهُۥٓ أَحَدٌ وَلَا يُوثِقُ وَثَاقَهُۥٓ أَحَدٌ يَٰٓأَيَّتُهَا ٱلنَّفۡسُ ٱلۡمُطۡمَئِنَّةُ ٱرۡجِعِيٓ إِلَىٰ رَبِّكِ رَاضِيَةٗ مَّرۡضِيَّةٗ فَٱدۡخُلِي فِي عِبَٰدِي وَٱدۡخُلِي جَنَّتِي`,
  albalad: `لَآ أُقۡسِمُ بِهَٰذَا ٱلۡبَلَدِ وَأَنتَ حِلُّۢ بِهَٰذَا ٱلۡبَلَدِ وَوَالِدٖ وَمَا وَلَدَ لَقَدۡ خَلَقۡنَا ٱلۡإِنسَٰنَ فِي كَبَدٍ أَيَحۡسَبُ أَن لَّن يَقۡدِرَ عَلَيۡهِ أَحَدٌ يَقُولُ أَهۡلَكۡتُ مَالٗا لُّبَدًا أَيَحۡسَبُ أَن لَّمۡ يَرَهُۥٓ أَحَدٌ أَلَمۡ نَجۡعَل لَّهُۥ عَيۡنَيۡنِ وَلِسَانٗا وَشَفَتَيۡنِ وَهَدَيۡنَٰهُ ٱلنَّجۡدَيۡنِ فَلَا ٱقۡتَحَمَ ٱلۡعَقَبَةَ وَمَآ أَدۡرَىٰكَ مَا ٱلۡعَقَبَةُ فَكُّ رَقَبَةٍ أَوۡ إِطۡعَٰمٌ فِي يَوۡمٖ ذِي مَسۡغَبَةٖ يَتِيمٗا ذَا مَقۡرَبَةٍ أَوۡ مِسۡكِينٗا ذَا مَتۡرَبَةٍ ثُمَّ كَانَ مِنَ ٱلَّذِينَ ءَامَنُواْ وَتَوَاصَوۡاْ بِٱلصَّبۡرِ وَتَوَاصَوۡاْ بِٱلۡمَرۡحَمَةِ أُوْلَٰٓئِكَ أَصۡحَٰبُ ٱلۡمَيۡمَنَةِ وَٱلَّذِينَ كَفَرُواْ بِـَٔايَٰتِنَا هُمۡ أَصۡحَٰبُ ٱلۡمَشۡـَٔمَةِ عَلَيۡهِمۡ نَارٌ مُّؤۡصَدَةٌ`,
  alshams: `وَٱلشَّمۡسِ وَضُحَىٰهَا وَٱلۡقَمَرِ إِذَا تَلَىٰهَا وَٱلنَّهَارِ إِذَا جَلَّىٰهَا وَٱلَّيۡلِ إِذَا يَغۡشَىٰهَا وَٱلسَّمَآءِ وَمَا بَنَىٰهَا وَٱلۡأَرۡضِ وَمَا طَحَىٰهَا وَنَفۡسٖ وَمَا سَوَّىٰهَا فَأَلۡهَمَهَا فُجُورَهَا وَتَقۡوَىٰهَا قَدۡ أَفۡلَحَ مَن زَكَّىٰهَا وَقَدۡ خَابَ مَن دَسَّىٰهَا كَذَّبَتۡ ثَمُودُ بِطَغۡوَىٰهَآ إِذِ ٱنۢبَعَثَ أَشۡقَىٰهَا فَقَالَ لَهُمۡ رَسُولُ ٱللَّهِ نَاقَةَ ٱللَّهِ وَسُقۡيَٰهَا فَكَذَّبُوهُ فَعَقَرُوهَا فَدَمۡدَمَ عَلَيۡهِمۡ رَبُّهُم بِذَنۢبِهِمۡ فَسَوَّىٰهَا وَلَا يَخَافُ عُقۡبَٰهَا`,
  allayl: `وَٱلَّيۡلِ إِذَا يَغۡشَىٰ وَٱلنَّهَارِ إِذَا تَجَلَّىٰ وَمَا خَلَقَ ٱلذَّكَرَ وَٱلۡأُنثَىٰ إِنَّ سَعۡيَكُمۡ لَشَتَّىٰ فَأَمَّا مَنۡ أَعۡطَىٰ وَٱتَّقَىٰ وَصَدَّقَ بِٱلۡحُسۡنَىٰ فَسَنُيَسِّرُهُۥ لِلۡيُسۡرَىٰ وَأَمَّا مَنۢ بَخِلَ وَٱسۡتَغۡنَىٰ وَكَذَّبَ بِٱلۡحُسۡنَىٰ فَسَنُيَسِّرُهُۥ لِلۡعُسۡرَىٰ وَمَا يُغۡنِي عَنۡهُ مَالُهُۥٓ إِذَا تَرَدَّىٰ إِنَّ عَلَيۡنَا لَلۡهُدَىٰ وَإِنَّ لَنَا لَلۡأٓخِرَةَ وَٱلۡأُولَىٰ فَأَنذَرۡتُكُمۡ نَارٗا تَلَظَّىٰ لَا يَصۡلَىٰهَآ إِلَّا ٱلۡأَشۡقَى ٱلَّذِي كَذَّبَ وَتَوَلَّىٰ وَسَيُجَنَّبُهَا ٱلۡأَتۡقَى ٱلَّذِي يُؤۡتِي مَالَهُۥ يَتَزَكَّىٰ وَمَا لِأَحَدٍ عِندَهُۥ مِن نِّعۡمَةٖ تُجۡزَىٰ إِلَّا ٱبۡتِغَآءَ وَجۡهِ رَبِّهِ ٱلۡأَعۡلَىٰ وَلَسَوۡفَ يَرۡضَىٰ`,
  alduha: `وَٱلضُّحَىٰ وَٱلَّيۡلِ إِذَا سَجَىٰ مَا وَدَّعَكَ رَبُّكَ وَمَا قَلَىٰ وَلَلۡأٓخِرَةُ خَيۡرٞ لَّكَ مِنَ ٱلۡأُولَىٰ وَلَسَوۡفَ يُعۡطِيكَ رَبُّكَ فَتَرۡضَىٰ أَلَمۡ يَجِدۡكَ يَتِيمٗا فَـَٔاوَىٰ وَوَجَدَكَ ضَآلّٗا فَهَدَىٰ وَوَجَدَكَ عَآئِلٗا فَأَغۡنَىٰ فَأَمَّا ٱلۡيَتِيمَ فَلَا تَقۡهَرۡ وَأَمَّا ٱلسَّآئِلَ فَلَا تَنۡهَرۡ وَأَمَّا بِنِعۡمَةِ رَبِّكَ فَحَدِّثۡ`,
  alsharh: `أَلَمۡ نَشۡرَحۡ لَكَ صَدۡرَكَ وَوَضَعۡنَا عَنكَ وِزۡرَكَ ٱلَّذِيٓ أَنقَضَ ظَهۡرَكَ وَرَفَعۡنَا لَكَ ذِكۡرَكَ فَإِنَّ مَعَ ٱلۡعُسۡرِ يُسۡرٗا إِنَّ مَعَ ٱلۡعُسۡرِ يُسۡرٗا فَإِذَا فَرَغۡتَ فَٱنصَبۡ وَإِلَىٰ رَبِّكَ فَٱرۡغَب`,
  atteen: `وَٱلتِّينِ وَٱلزَّيۡتُونِ وَطُورِ سِينِينَ وَهَٰذَا ٱلۡبَلَدِ ٱلۡأَمِينِ لَقَدۡ خَلَقۡنَا ٱلۡإِنسَٰنَ فِيٓ أَحۡسَنِ تَقۡوِيمٖ ثُمَّ رَدَدۡنَٰهُ أَسۡفَلَ سَٰفِلِينَ إِلَّا ٱلَّذِينَ ءَامَنُواْ وَعَمِلُواْ ٱلصَّٰلِحَٰتِ فَلَهُمۡ أَجۡرٌ غَيۡرُ مَمۡنُونٖ فَمَا يُكَذِّبُكَ بَعۡدُ بِٱلدِّينِ أَلَيۡسَ ٱللَّهُ بِأَحۡكَمِ ٱلۡحَٰكِمِينَ`,
  alalaq: `ٱقۡرَأۡ بِٱسۡمِ رَبِّكَ ٱلَّذِي خَلَقَ خَلَقَ ٱلۡإِنسَٰنَ مِنۡ عَلَقٍ ٱقۡرَأۡ وَرَبُّكَ ٱلۡأَكۡرَمُ ٱلَّذِي عَلَّمَ بِٱلۡقَلَمِ عَلَّمَ ٱلۡإِنسَٰنَ مَا لَمۡ يَعۡلَمۡ كَلَّآ إِنَّ ٱلۡإِنسَٰنَ لَيَطۡغَىٰٓ أَن رَّءَاهُ ٱسۡتَغۡنَىٰ إِنَّ إِلَىٰ رَبِّكَ ٱلرُّجۡعَىٰ أَرَءَيۡتَ ٱلَّذِي يَنۡهَىٰ عَبۡدًا إِذَا صَلَّىٰ أَرَءَيۡتَ إِن كَانَ عَلَى ٱلۡهُدَىٰ أَوۡ أَمَرَ بِٱلتَّقۡوَىٰ أَرَءَيۡتَ إِن كَذَّبَ وَتَوَلَّىٰ أَلَمۡ يَعۡلَم بِأَنَّ ٱللَّهَ يَرَىٰ كَلَّا لَئِن لَّمۡ يَنتَهِ لَنَسۡفَعَۢا بِٱلنَّاصِيَةِ نَاصِيَةٖ كَٰذِبَةٍ خَاطِئَةٍ فَلۡيَدۡعُ نَادِيَهُۥ سَنَدۡعُ ٱلزَّبَانِيَةَ كَلَّا لَا تُطِعۡهُ وَٱسۡجُدۡ وَٱقۡتَرِب`,
  alqadr: `إِنَّآ أَنزَلۡنَٰهُ فِي لَيۡلَةِ ٱلۡقَدۡرِ وَمَآ أَدۡرَىٰكَ مَا لَيۡلَةُ ٱلۡقَدۡرِ لَيۡلَةُ ٱلۡقَدۡرِ خَيۡرٞ مِّنۡ أَلۡفِ شَهۡرٖ تَنَزَّلُ ٱلۡمَلَٰٓئِكَةُ وَٱلرُّوحُ فِيهَا بِإِذۡنِ رَبِّهِم مِّن كُلِّ أَمۡرٖ سَلَٰمٌ هِيَ حَتَّىٰ مَطۡلَعِ ٱلۡفَجۡرِ`,
  albayyina: `لَمۡ يَكُنِ ٱلَّذِينَ كَفَرُواْ مِنۡ أَهۡلِ ٱلۡكِتَٰبِ وَٱلۡمُشۡرِكِينَ مُنفَكِّينَ حَتَّىٰ تَأۡتِيَهُمُ ٱلۡبَيِّنَةُ رَسُولٞ مِّنَ ٱللَّهِ يَتۡلُواْ صُحُفٗا مُّطَهَّرَةٗ فِيهَا كُتُبٞ قَيِّمَةٞ وَمَا تَفَرَّقَ ٱلَّذِينَ أُوتُواْ ٱلۡكِتَٰبَ إِلَّا مِنۢ بَعۡدِ مَا جَآءَتۡهُمُ ٱلۡبَيِّنَةُ وَمَآ أُمِرُوٓاْ إِلَّا لِيَعۡبُدُواْ ٱللَّهَ مُخۡلِصِينَ لَهُ ٱلدِّينَ حُنَفَآءَ وَيُقِيمُواْ ٱلصَّلَوٰةَ وَيُؤۡتُواْ ٱلزَّكَوٰةَ وَذَٰلِكَ دِينُ ٱلۡقَيِّمَةِ إِنَّ ٱلَّذِينَ كَفَرُواْ مِنۡ أَهۡلِ ٱلۡكِتَٰبِ وَٱلۡمُشۡرِكِينَ فِي نَارِ جَهَنَّمَ خَٰلِدِينَ فِيهَآ أُوْلَٰٓئِكَ هُمۡ شَرُّ ٱلۡبَرِيَّةِ إِنَّ ٱلَّذِينَ ءَامَنُواْ وَعَمِلُواْ ٱلصَّٰلِحَٰتِ أُوْلَٰٓئِكَ هُمۡ خَيۡرُ ٱلۡبَرِيَّةِ جَزَآؤُهُمۡ عِندَ رَبِّهِمۡ جَنَّٰتُ عَدۡنٖ تَجۡرِي مِن تَحۡتِهَا ٱلۡأَنۡهَٰرُ خَٰلِدِينَ فِيهَآ أَبَدٗا رَّضِيَ ٱللَّهُ عَنۡهُمۡ وَرَضُواْ عَنۡهُ ذَٰلِكَ لِمَنۡ خَشِيَ رَبَّهُۥ`,
  alzalzala: `إِذَا زُلۡزِلَتِ ٱلۡأَرۡضُ زِلۡزَالَهَا وَأَخۡرَجَتِ ٱلۡأَرۡضُ أَثۡقَالَهَا وَقَالَ ٱلۡإِنسَٰنُ مَا لَهَا يَوۡمَئِذٖ تُحَدِّثُ أَخۡبَارَهَا بِأَنَّ رَبَّكَ أَوۡحَىٰ لَهَا يَوۡمَئِذٖ يَصۡدُرُ ٱلنَّاسُ أَشۡتَاتٗا لِّيُرَوۡاْ أَعۡمَٰلَهُمۡ فَمَن يَعۡمَلۡ مِثۡقَالَ ذَرَّةٍ خَيۡرٗا يَرَهُۥ وَمَن يَعۡمَلۡ مِثۡقَالَ ذَرَّةٖ شَرّٗا يَرَهُۥ`,
  alaadiyat: `وَٱلۡعَٰدِيَٰتِ ضَبۡحٗا فَٱلۡمُورِيَٰتِ قَدۡحٗا فَٱلۡمُغِيرَٰتِ صُبۡحٗا فَأَثَرۡنَ بِهِۦ نَقۡعٗا فَوَسَطۡنَ بِهِۦ جَمۡعٗا إِنَّ ٱلۡإِنسَٰنَ لِرَبِّهِۦ لَكَنُودٞ وَإِنَّهُۥ عَلَىٰ ذَٰلِكَ لَشَهِيدٞ وَإِنَّهُۥ لِحُبِّ ٱلۡخَيۡرِ لَشَدِيدٞ أَفَلَا يَعۡلَمُ إِذَا بُعۡثِرَ مَا فِي ٱلۡقُبُورِ وَحُصِّلَ مَا فِي ٱلصُّدُورِ إِنَّ رَبَّهُم بِهِمۡ يَوۡمَئِذٖ لَّخَبِيرٌۢ`,
  alqaria: `ٱلۡقَارِعَةُ مَا ٱلۡقَارِعَةُ وَمَآ أَدۡرَىٰكَ مَا ٱلۡقَارِعَةُ يَوۡمَ يَكُونُ ٱلنَّاسُ كَٱلۡفَرَاشِ ٱلۡمَبۡثُوثِ وَتَكُونُ ٱلۡجِبَالُ كَٱلۡعِهۡنِ ٱلۡمَنفُوشِ فَأَمَّا مَن ثَقُلَتۡ مَوَٰزِينُهُۥ فَهُوَ فِي عِيشَةٖ رَّاضِيَةٖ وَأَمَّا مَنۡ خَفَّتۡ مَوَٰزِينُهُۥ فَأُمُّهُۥ هَاوِيَةٞ وَمَآ أَدۡرَىٰكَ مَا هِيَهۡ نَارٌ حَامِيَةٌۢ`,
  altakathur: `أَلۡهَىٰكُمُ ٱلتَّكَاثُرُ حَتَّىٰ زُرۡتُمُ ٱلۡمَقَابِرَ كَلَّا سَوۡفَ تَعۡلَمُونَ ثُمَّ كَلَّا سَوۡفَ تَعۡلَمُونَ كَلَّا لَوۡ تَعۡلَمُونَ عِلۡمَ ٱلۡيَقِينِ لَتَرَوُنَّ ٱلۡجَحِيمَ ثُمَّ لَتَرَوُنَّهَا عَيۡنَ ٱلۡيَقِينِ ثُمَّ لَتُسۡـَٔلُنَّ يَوۡمَئِذٍ عَنِ ٱلنَّعِيمِ`,
  alasr: `وَٱلۡعَصۡرِ إِنَّ ٱلۡإِنسَٰنَ لَفِي خُسۡرٍ إِلَّا ٱلَّذِينَ ءَامَنُواْ وَعَمِلُواْ ٱلصَّٰلِحَٰتِ وَتَوَاصَوۡاْ بِٱلۡحَقِّ وَتَوَاصَوۡاْ بِٱلصَّبۡرِ`,
  alhumaza: `وَيۡلٞ لِّكُلِّ هُمَزَةٖ لُّمَزَةٍ ٱلَّذِي جَمَعَ مَالٗا وَعَدَّدَهُۥ يَحۡسَبُ أَنَّ مَالَهُۥٓ أَخۡلَدَهُۥ كَلَّا لَيُنۢبَذَنَّ فِي ٱلۡحُطَمَةِ وَمَآ أَدۡرَىٰكَ مَا ٱلۡحُطَمَةُ نَارُ ٱللَّهِ ٱلۡمُوقَدَةُ ٱلَّتِي تَطَّلِعُ عَلَى ٱلۡأَفۡـِٔدَةِ إِنَّهَا عَلَيۡهِم مُّؤۡصَدَةٌ فِي عَمَدٖ مُّمَدَّدَةِۭ`,
  alfiyl: `أَلَمۡ تَرَ كَيۡفَ فَعَلَ رَبُّكَ بِأَصۡحَٰبِ ٱلۡفِيلِ أَلَمۡ يَجۡعَلۡ كَيۡدَهُمۡ فِي تَضۡلِيلٖ وَأَرۡسَلَ عَلَيۡهِمۡ طَيۡرًا أَبَابِيلَ تَرۡمِيهِم بِحِجَارَةٖ مِّن سِجِّيلٖ فَجَعَلَهُمۡ كَعَصۡفٖ مَّأۡكُولِۭ`,
  aquraysh: `لِإِيلَٰفِ قُرَيۡشٍ إِۦلَٰفِهِمۡ رِحۡلَةَ ٱلشِّتَآءِ وَٱلصَّيۡفِ فَلۡيَعۡبُدُواْ رَبَّ هَٰذَا ٱلۡبَيۡتِ ٱلَّذِيٓ أَطۡعَمَهُم مِّن جُوعٖ وَءَامَنَهُم مِّنۡ خَوۡفِۭ`,
  almaoon: `أَرَءَيۡتَ ٱلَّذِي يُكَذِّبُ بِٱلدِّينِ فَذَٰلِكَ ٱلَّذِي يَدُعُّ ٱلۡيَتِيمَ وَلَا يَحُضُّ عَلَىٰ طَعَامِ ٱلۡمِسۡكِينِ فَوَيۡلٞ لِّلۡمُصَلِّينَ ٱلَّذِينَ هُمۡ عَن صَلَاتِهِمۡ سَاهُونَ ٱلَّذِينَ هُمۡ يُرَآءُونَ وَيَمۡنَعُونَ ٱلۡمَاعُونَ`,
  alkawthur: `إِنَّآ أَعۡطَيۡنَٰكَ ٱلۡكَوۡثَرَ فَصَلِّ لِرَبِّكَ وَٱنۡحَرۡ إِنَّ شَانِئَكَ هُوَ ٱلۡأَبۡتَرُ`,
  alkafirun: `قُلۡ يَٰٓأَيُّهَا ٱلۡكَٰفِرُونَ لَآ أَعۡبُدُ مَا تَعۡبُدُونَ وَلَآ أَنتُمۡ عَٰبِدُونَ مَآ أَعۡبُدُ وَلَآ أَنَا۠ عَابِدٞ مَّا عَبَدتُّمۡ وَلَآ أَنتُمۡ عَٰبِدُونَ مَآ أَعۡبُدُ لَكُمۡ دِينُكُمۡ وَلِيَ دِينِ`,
  alnnasr: `إِذَا جَآءَ نَصۡرُ ٱللَّهِ وَٱلۡفَتۡحُ وَرَأَيۡتَ ٱلنَّاسَ يَدۡخُلُونَ فِي دِينِ ٱللَّهِ أَفۡوَاجٗا فَسَبِّحۡ بِحَمۡدِ رَبِّكَ وَٱسۡتَغۡفِرۡهُ إِنَّهُۥ كَانَ تَوَّابَۢا`,
  almasad: `تَبَّتۡ يَدَآ أَبِي لَهَبٖ وَتَبَّ مَآ أَغۡنَىٰ عَنۡهُ مَالُهُۥ وَمَا كَسَبَ سَيَصۡلَىٰ نَارٗا ذَاتَ لَهَبٖ وَٱمۡرَأَتُهُۥ حَمَّالَةَ ٱلۡحَطَبِ فِي جِيدِهَا حَبۡلٞ مِّن مَّسَدِۭ`,
  alikhlas: `قُلۡ هُوَ ٱللَّهُ أَحَدٌ ٱللَّهُ ٱلصَّمَدُ لَمۡ يَلِدۡ وَلَمۡ يُولَدۡ وَلَمۡ يَكُن لَّهُۥ كُفُوًا أَحَدٌ`,
  alfalaq: `قُلۡ أَعُوذُ بِرَبِّ ٱلۡفَلَقِ مِن شَرِّ مَا خَلَقَ وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ وَمِن شَرِّ ٱلنَّفَّٰثَٰتِ فِي ٱلۡعُقَدِ وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ`,
  alnnas: `قُلۡ أَعُوذُ بِرَبِّ ٱلنَّاسِ مَلِكِ ٱلنَّاسِ إِلَٰهِ ٱلنَّاسِ مِن شَرِّ ٱلۡوَسۡوَاسِ ٱلۡخَنَّاسِ ٱلَّذِي يُوَسۡوِسُ فِي صُدُورِ ٱلنَّاسِ مِنَ ٱلۡجِنَّةِ وَٱلنَّاسِ`,
  alghasiya: `هَلْ أَتَىٰكَ حَدِيثُ ٱلْغَٰشِيَةِ وُجُوهٌ يَوْمَئِذٍ خَٰشِعَةٌ عَامِلَةٌ نَّاصِبَةٌ تَصْلَىٰ نَارًا حَامِيَةً تُسْقَىٰ مِنْ عَيْنٍ ءَانِيَةٍ لَّيْسَ لَهُمْ طَعَامٌ إِلَّا مِن ضَرِيعٍ لَّا يُسْمِنُ وَلَا يُغْنِى مِن جُوعٍ وُجُوهٌ يَوْمَئِذٍ نَّاعِمَةٌ لِّسَعْيِهَا رَاضِيَةٌ فِى جَنَّةٍ عَالِيَةٍ لَّا تَسْمَعُ فِيهَا لَٰغِيَةً فِيهَا عَيْنٌ جَارِيَةٌ فِيهَا سُرُرٌ مَّرْفُوعَةٌ وَأَكْوَابٌ مَّوْضُوعَةٌ وَنَمَارِقُ مَصْفُوفَةٌ وَزَرَابِىُّ مَبْثُوثَةٌ أَفَلَا يَنظُرُونَ إِلَى ٱلْإِبِلِ كَيْفَ خُلِقَتْ وَإِلَى ٱلسَّمَآءِ كَيْفَ رُفِعَتْ وَإِلَى ٱلْجِبَالِ كَيْفَ نُصِبَتْ وَإِلَى ٱلْأَرْضِ كَيْفَ سُطِحَتْ فَذَكِّرْ إِنَّمَآ أَنتَ مُذَكِّرٌ لَّسْتَ عَلَيْهِم بِمُصَيْطِرٍ إِلَّا مَن تَوَلَّىٰ وَكَفَرَ فَيُعَذِّبُهُ ٱللَّهُ ٱلْعَذَابَ ٱلْأَكْبَرَ إِنَّ إِلَيْنَآ إِيَابَهُمْ ثُمَّ إِنَّ عَلَيْنَا حِسَابَهُم`
};

let currentKey='',refWords=[];

// ===== normalize مُصلحة — تطابق القالب الرئيسي =====
function norm(s){
  if(!s)return'';
  return s
    // همزة على كشيدة: ـَٔ = صوت ألف، غيرها = همزة تتحذف
    .replace(/ـ\u064E\u0654/g,'ا')
    .replace(/ـ[\u064B-\u065F]*[\u0654\u0655]/g,'')
    .replace(/ـ/g,'')
    // حذف التشكيل أولاً لضمان صحة ىٰ وغيرها
    .replace(/[\u064B-\u065F\u0610-\u061A\u06D6-\u06DC\u06DF-\u06E4\u06E7\u06E8\u06EA-\u06ED]/g,'')
    // هاؤلاء/هؤلاء قبل حذف ؤ (وإلا تصبح الـ rule ميتة)
    .replace(/ها[ؤو]لاء|ها[ؤو]لا(?!\S)/g,'هالا')
    .replace(/ه[ؤو]لاء|ه[ؤو]لا(?!\S)/g,'هالا')
    // ألف وصل بعد واو (وَٱسۡجُدۡ → وسجد) ما عدا ال التعريف
    .replace(/وٱ(?!ل)/g,'و')
    // واسجد/واقترب: المستخدم يكتب الألف في وصل الكلام
    .replace(/^وا(?!ل)/g,'و')
    // وٰ: قبل ة = تتحذف الواو (الصلاة)، غيرها = واو + ا (السماوات، أبواب)
    .replace(/وٰ(?=ة)/g,'ا')
    .replace(/وٰ/g,'وا')
    .replace(/اٰ/g,'ا')
    // يٰ = يا (ألف خنجرية فوق الياء = ي + ا، مثل يَٰلَيْتَنِى، بِـَٔايَٰتِنَا)
    .replace(/يٰ/g,'يا')
    // ىٰ في وسط الكلمة = ا (أدراك، ألهاكم)، في آخرها = ي (على، ليطغى)
    .replace(/ىٰ(?=\S)/g,'ا')
    .replace(/ىٰ/g,'ي')
    .replace(/(.)ٰ/g,'$1ا')
    .replace(/هۥ/g,'ه').replace(/هۦ/g,'ه')
    .replace(/ۦ(?=\S)/g,'ي').replace(/ۦ/g,'').replace(/ۥ/g,'')
    .replace(/[ئؤ]/g,'ء').replace(/ء/g,'')
    .replace(/[آأإٱا]/g,'ا').replace(/[ىی]/g,'ي').replace(/ة/g,'ه')
    .replace(/(.)\1+/g,'$1')
    .replace(/رحمان/g,'رحمن')
    // الإقلاب: ن قبل ب تُنطق م (انبعث = امبعث، منبثاً = ممبثاً)
    .replace(/نب/g,'مب')
    .replace(/ياايها/g,'يايها').replace(/يا ايها/g,'يايها')
    .replace(/هاذا/g,'هذا').replace(/ذالك/g,'ذلك')
    .replace(/الاه/g,'اله').replace(/ارايت/g,'اريت')
    .replace(/وا(?=\s|$)/g,'و')
    .replace(/اولك/g,'اولاك')
    .replace(/\s+/g,' ')
    .trim();
}

function mergeYaAyyuha(words){
  const out=[];
  for(let i=0;i<words.length;i++){
    // دمج "يا" مع الكلمة التالية دايماً (نداء: يا ليتني، يا أيها، يا إبراهيم...)
    if(i<words.length-1 && norm(words[i])==='يا'){
      out.push(words[i]+words[i+1]);i++;continue;
    }
    out.push(words[i]);
  }
  return out;
}

// ===== البسملة: آية فعلية في الفاتحة فقط — في باقي السور افتتاحية اختيارية =====
// لو ذُكرت من المستخدم في غير الفاتحة لا تُحسب خطأ زائد، ولو اتُركت لا تُحسب ناقصة
const BASMALA_REF=['بِسْمِ','ٱللَّهِ','ٱلرَّحْمَٰنِ','ٱلرَّحِيمِ'];
function stripLeadingBasmala(words){
  if(words.length>=4){
    const head=words.slice(0,4).map(norm).join(' ');
    const bas=BASMALA_REF.map(norm).join(' ');
    if(head===bas)return words.slice(4);
  }
  return words;
}

// ===== الحروف المقطعة: تُنطق أسماء حروف منفصلة لا تُقرأ ككلمة عادية =====
// تظهر فقط في أول كلمة (أو كلمتين، مثل حم + عسق) من السورة
const MUQATTAAT={
  'الم':['الف','لام','ميم'],
  'المص':['الف','لام','ميم','صاد'],
  'الر':['الف','لام','را'],
  'المر':['الف','لام','ميم','را'],
  'كهيعص':['كاف','ها','يا','عين','صاد'],
  'طه':['طا','ها'],
  'طسم':['طا','سين','ميم'],
  'طس':['طا','سين'],
  'يس':['يا','سين'],
  'ص':['صاد'],
  'حم':['حا','ميم'],
  'عسق':['عين','سين','قاف'],
  'ق':['قاف'],
  'ن':['نون']
};
function expandMuqattaat(words){
  const out=[];let i=0;
  while(i<words.length&&i<2){
    const key=norm(words[i]);
    if(MUQATTAAT[key]){out.push(...MUQATTAAT[key]);i++;}
    else break;
  }
  for(;i<words.length;i++)out.push(words[i]);
  return out;
}

function onSelectSurah(){
  const sel=document.getElementById('surahSelect');currentKey=sel.value;
  if(!currentKey){document.getElementById('selectedInfo').style.display='none';return;}
  refWords=TEXTS[currentKey].split(/\s+/).filter(w=>w.length>0);
  if(currentKey!=='fatiha')refWords=stripLeadingBasmala(refWords);
  refWords=expandMuqattaat(refWords);
  document.getElementById('selectedInfo').textContent='✓ '+SURAH_NAMES[currentKey]+' — '+refWords.length+' كلمة';
  document.getElementById('selectedInfo').style.display='block';
  document.getElementById('recBtn').textContent='🎤 اضغط وابدأ التلاوة';
  document.getElementById('recBtn').disabled=false;
  document.getElementById('recBtn').style.opacity='1';
  document.getElementById('recBtn').style.cursor='pointer';
  document.getElementById('revealBtn').style.display='block';
  clearAll();
}

function toggleReveal(){
  const box=document.getElementById('revealBox');
  const btn=document.getElementById('revealBtn');

  if(showing){
    box.style.display='none';
    btn.textContent='📖 اعرض نص السورة';
  }else{

      const toAr=n=>String(n).split('').map(d=>ar[+d]).join('');
      box.innerHTML=AYAHS[currentKey].map((a,i)=>

      ).join(' ');
    }else{
      box.textContent=refWords.join(' ');
    }
    box.style.display='block';
    btn.textContent='🙈 إخفاء النص';
  }
}

function findStart(userWords){
  if(!userWords.length)return 0;
  for(let i=0;i<=refWords.length-2;i++){
    const u2=userWords.slice(0,2).map(norm).join(' ');
    const r2=refWords.slice(i,i+2).map(norm).join(' ');
    if(u2===r2)return i;
  }
  const u1=norm(userWords[0]);
  for(let i=0;i<refWords.length;i++){if(norm(refWords[i])===u1)return i;}
  return 0;
}

function compareWords(userWords,ref){
  const n=ref.length,m=userWords.length;
  const dp=Array.from({length:n+1},()=>new Array(m+1).fill(0));
  for(let i=1;i<=n;i++)for(let j=1;j<=m;j++){
    if(norm(ref[i-1])===norm(userWords[j-1]))dp[i][j]=dp[i-1][j-1]+1;
    else dp[i][j]=Math.max(dp[i-1][j],dp[i][j-1]);
  }
  const aligned=[];let i=n,j=m;
  while(i>0||j>0){
    if(i>0&&j>0&&norm(ref[i-1])===norm(userWords[j-1])){aligned.push({ref:ref[i-1],user:userWords[j-1],status:'ok'});i--;j--;}
    else if(j>0&&(i===0||dp[i][j-1]>=dp[i-1][j])){j--;}
    else{aligned.push({ref:ref[i-1],user:'',status:'missing'});i--;}
  }
  return aligned.reverse();
}

const SpeechAPI=window.SpeechRecognition||window.webkitSpeechRecognition;
const isSecure=location.protocol==='https:'||location.hostname==='localhost';
let recInst=null,recognizing=false,savedWords=[],currentText='';

function renderTranscript(){
  const box=document.getElementById('transcriptBox');
  box.innerHTML='';
  if(!savedWords.length&&!currentText){
    box.style.color='var(--border)';
    box.textContent='سيظهر النص هنا...';
    return;
  }
  box.style.color='var(--text)';
  savedWords.forEach((w,i)=>{
    const sp=document.createElement('span');sp.className='rec-word';
    sp.textContent=w;sp.title='انقري للحذف';
    sp.onclick=()=>{savedWords.splice(i,1);renderTranscript();updateBtns();};
    box.appendChild(sp);
  });
  if(currentText){
    const cur=document.createElement('span');
    cur.style.cssText='color:var(--teal);font-style:italic;margin:2px;';
    cur.textContent=' '+currentText;box.appendChild(cur);
  }
}

function updateBtns(){
  const hasWords=savedWords.length>0||currentText.length>0;
  document.getElementById('checkBtn').className='check-btn'+(hasWords?' visible':'');
  document.getElementById('clearBtn').className='clear-btn'+(hasWords?' visible':'');
}

function makeRec(){
  const r=new SpeechAPI();r.lang='ar-SA';r.continuous=true;r.interimResults=false;
  r.onstart=()=>{recognizing=true;currentText='';setBtn('rec');renderTranscript();};
  r.onresult=e=>{
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal){
        const newW=e.results[i][0].transcript.trim().split(/\s+/).filter(w=>w);
        savedWords=savedWords.concat(newW);currentText='';
      }
    }
    renderTranscript();updateBtns();
  };
  r.onerror=e=>{if(e.error!=='no-speech'&&e.error!=='aborted'){recognizing=false;setBtn(savedWords.length?'paused':'idle');}};
  r.onend=()=>{
    recognizing=false;
    if(currentText){savedWords=savedWords.concat(currentText.trim().split(/\s+/).filter(w=>w));currentText='';}
    renderTranscript();setBtn(savedWords.length?'paused':'idle');
  };
  return r;
}

function toggleRec(){
  if(!currentKey){alert('اختاري سورة أولاً');return;}
  if(!SpeechAPI||!isSecure){alert('التسجيل يعمل على الموقع الرسمي (https) فقط');return;}
  if(recognizing){
    recognizing=false;
    try{recInst.stop();}catch(e){}setBtn('paused');return;
  }
  recInst=makeRec();
  try{recInst.start();}catch(e){setBtn('idle');}
}

function setBtn(state){
  const btn=document.getElementById('recBtn');
  if(state==='rec'){btn.textContent='⏸ إيقاف مؤقت';btn.className='rec-btn recording';}
  else if(state==='paused'){btn.textContent='▶️ استمر في التلاوة';btn.className='rec-btn paused';}
  else{btn.textContent='🎤 اضغط وابدأ التلاوة';btn.className='rec-btn';}
}

function clearAll(){
  if(recognizing){try{recInst.stop();}catch(e){}recognizing=false;}
  recInst=null;savedWords=[];currentText='';
  renderTranscript();
  document.getElementById('checkBtn').className='check-btn';
  document.getElementById('clearBtn').className='clear-btn';
  document.getElementById('resultCard').style.display='none';
  setBtn(currentKey?'idle':'idle');
  if(currentKey){
    document.getElementById('recBtn').disabled=false;
    document.getElementById('recBtn').style.opacity='1';
  }
}
function retryRec(){clearAll();}

function checkRecitation(){
  if(recognizing){try{recInst.stop();}catch(e){}recognizing=false;}
  setBtn('idle');
  const userWords=mergeYaAyyuha(savedWords.filter(w=>w.length>0));
  if(!userWords.length)return;
  const startIdx=findStart(userWords);
  const ref=refWords.slice(startIdx,startIdx+userWords.length+10);
  const results=compareWords(userWords,ref);
  const ok=results.filter(r=>r.status==='ok').length;
  const bad=results.filter(r=>r.status!=='ok').length;
  const total=results.length;
  const pct=Math.round(ok/total*100);
  let where=startIdx===0?'بدأتِ من أول السورة':'📍 بدأتِ من الكلمة '+(startIdx+1)+' تقريباً';
  document.getElementById('resultCard').style.display='block';
  document.getElementById('whereMsg').textContent=where;
  document.getElementById('statOk').textContent='✓ '+ok;
  document.getElementById('statErr').textContent='✗ '+bad;
  document.getElementById('statPct').textContent='٪ '+pct;
  const fill=document.getElementById('scoreFill');
  fill.style.width=pct+'%';
  fill.style.background=pct>=80?'#4a7c4a':pct>=60?'#e67e22':'#c0392b';
  document.getElementById('resultTitle').textContent=
    pct===100?'🌟 ممتاز! تلاوة مثالية':pct>=80?'✨ أحسنتِ!':pct>=60?'📖 جيد — راجعي الكلمات الحمراء':'💪 تحتاجين مراجعة';
  if(pct===100){
    launchConfetti();
  }
  const display=document.getElementById('ayahDisplay');
  display.innerHTML='';
  results.forEach(r=>{
    const sp=document.createElement('span');
    if(r.status==='ok'){sp.className='w-ok';sp.textContent=r.ref;}
    else if(r.status==='err'){sp.className='w-err';sp.textContent=r.ref;sp.title='قلتِ: '+(r.user||'');}
    else{sp.className='w-missing';sp.textContent=r.ref;}
    display.appendChild(sp);display.appendChild(document.createTextNode(' '));
  });
  document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});
}

function shareApp(){
  const url='https://quran-darbi.github.io/Quran-test-/';
  const title='دربي لحفظ القرآن';
  if(navigator.share){
    navigator.share({title,url}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(url).then(()=>{
      const btn=document.getElementById('share-btn');
      btn.textContent='✅';
      setTimeout(()=>btn.textContent='🔗',2000);
    }).catch(()=>{});
  }
}

function launchConfetti(){
  const colors=['#4a7c4a','#c4a84a','#5fae5f','#ffffff','#3a7a7c'];
  const count=80;
  for(let i=0;i<count;i++){
    const piece=document.createElement('div');
    piece.className='confetti-piece';
    const size=(Math.random()*8+6);
    piece.style.left=(Math.random()*100)+'vw';
    piece.style.width=size+'px';
    piece.style.height=(size*0.4)+'px';
    piece.style.background=colors[Math.floor(Math.random()*colors.length)];
    const duration=(Math.random()*1.5+2);
    piece.style.animationDuration=duration+'s';
    piece.style.animationDelay=(Math.random()*0.3)+'s';
    document.body.appendChild(piece);
    setTimeout(()=>piece.remove(),(duration+0.5)*1000);
  }
}

document.getElementById('recBtn').style.opacity='0.5';
document.getElementById('recBtn').style.cursor='default';
