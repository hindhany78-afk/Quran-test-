<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبر تلاوتك — دربي لحفظ القرآن</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-WFT6TYVB75"></script>

<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f4f0;--text:#2d4a2d;--card:#fff;--border:#c8d9c0;--gold:#c4a84a;--accent:#4a7c4a;--surface2:#f4f8f2;--surface3:#f8fbf6;--surface-hover:#e0edd8;--accent-dark:#3a6a3a;--wrong-border:#c0392b;--teal:#3a7a7c;}
html[data-theme="dark"]{--bg:#1c2420;--text:#d9ecd9;--card:#232f29;--border:#3a4d40;--gold:#d9b96a;--accent:#5fae5f;--surface2:#2a3830;--surface3:#1f2a24;--surface-hover:#324438;--accent-dark:#7fcf7f;--wrong-border:#e74c3c;--teal:#5fb8ba;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Amiri','Scheherazade New',serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;}
.top-bar{background:var(--bg);padding:12px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.back-btn{background:none;border:none;color:var(--accent);font-size:18px;cursor:pointer;text-decoration:none;font-family:inherit;}
#theme-toggle{background:var(--surface2);border:1.5px solid var(--border);border-radius:50%;width:36px;height:36px;font-size:16px;cursor:pointer;margin-right:auto;}
.info-card{margin:16px 16px 12px;background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:20px;text-align:center;position:relative;}
.info-card::before,.info-card::after{content:'✦';color:var(--gold);font-size:18px;position:absolute;top:14px;}
.info-card::before{right:16px;}.info-card::after{left:16px;}
.page-title{font-size:24px;font-weight:700;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--accent);line-height:1.7;}
/* اختيار السورة */
.select-card{margin:0 16px 12px;background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:18px 16px;}
.select-label{font-size:14px;color:var(--accent);margin-bottom:10px;font-weight:700;}
.surah-select{width:100%;padding:12px 14px;font-family:'Amiri',serif;font-size:16px;border:1.5px solid var(--border);border-radius:12px;background:var(--surface2);color:var(--text);direction:rtl;outline:none;cursor:pointer;}
.surah-select:focus{border-color:var(--accent);}
.selected-info{margin-top:10px;font-size:13px;color:var(--accent);background:var(--surface2);border-radius:8px;padding:8px 12px;text-align:center;display:none;}
/* التسجيل */
.rec-card{margin:0 16px 12px;background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:20px;}
.rec-desc{font-size:13px;color:#888;text-align:center;margin-bottom:16px;line-height:1.8;}
.rec-btn{width:100%;padding:18px;border-radius:14px;font-size:18px;font-family:inherit;cursor:pointer;border:2px solid var(--border);background:var(--surface2);color:var(--text);transition:all .25s;margin-bottom:10px;}
.rec-btn.recording{background:#e74c3c;color:#fff;border-color:#e74c3c;animation:pulse 1.2s infinite;}
.rec-btn.paused{background:#e67e22;color:#fff;border-color:#e67e22;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.4);}50%{box-shadow:0 0 0 10px rgba(231,76,60,0);}}
.clear-btn{width:100%;padding:10px;border-radius:10px;font-size:14px;font-family:inherit;cursor:pointer;border:1.5px solid var(--wrong-border);background:transparent;color:var(--wrong-border);display:none;margin-bottom:10px;}
.transcript-box{background:var(--surface3);border:1.5px solid var(--border);border-radius:12px;padding:14px;font-size:17px;line-height:2;direction:rtl;text-align:right;min-height:70px;margin-bottom:12px;display:none;color:var(--text);}
.check-btn{width:100%;padding:13px;border-radius:12px;font-size:17px;font-family:inherit;cursor:pointer;background:var(--accent);color:#fff;border:none;display:none;}
.check-btn:hover{background:var(--accent-dark);}
/* النتيجة */
.result-card{margin:0 16px 16px;background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:20px;display:none;}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.result-title{font-size:17px;font-weight:700;color:var(--accent);}
.result-stats{display:flex;gap:8px;}
.stat{border-radius:10px;padding:5px 12px;font-size:13px;font-weight:700;}
.stat.ok{background:#d4edda;color:#1a5c1a;}
.stat.err{background:#f8d7da;color:#7a1a1a;}
.score-bar{background:var(--surface2);border-radius:8px;height:10px;margin-bottom:14px;overflow:hidden;}
.score-fill{height:100%;border-radius:8px;transition:width .6s;}
.where-msg{font-size:12px;color:var(--accent);background:var(--surface2);border-radius:8px;padding:7px 12px;margin-bottom:12px;text-align:center;}
.legend{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;}
.legend-dot{width:13px;height:13px;border-radius:3px;}
.ayah-display{font-family:'Scheherazade New',serif;font-size:19px;line-height:3;direction:rtl;text-align:right;}
.w-ok{color:#155724;background:#c3e6cb;border-radius:4px;padding:1px 4px;margin:1px;}
.w-err{color:#fff;background:#c0392b;border-radius:4px;padding:1px 4px;margin:1px;}
.w-missing{color:#999;background:#f0f0f0;border-radius:4px;padding:1px 4px;margin:1px;text-decoration:line-through;}
.retry-btn{width:100%;padding:11px;border-radius:11px;font-size:15px;font-family:inherit;cursor:pointer;background:var(--surface2);color:var(--accent);border:1.5px solid var(--border);margin-top:10px;}
</style>
</head>
<body>
<div class="top-bar">
  <a href="index.html" class="back-btn">← الرجوع</a>
  <button id="theme-toggle" onclick="toggleTheme()">🌙</button>
</div>

<div class="info-card">
  <div class="page-title">🎤 اختبر تلاوتك</div>
  <div class="page-sub">اختر السورة — اقرأ من أي آية تريد — الموقع يصحح كل كلمة</div>
</div>

<div class="select-card">
  <div class="select-label">اختر السورة أو الصفحة</div>
  <select class="surah-select" id="surahSelect" onchange="onSelectSurah()">
    <option value="">— اختر —</option>
    <optgroup label="سورة الفاتحة">
      <option value="fatiha">سورة الفاتحة كاملة (٧ آيات)</option>
    </optgroup>
    <optgroup label="سورة البقرة">
      <option value="baqara_p2">ص٢ — آيات ١–٥</option>
      <option value="baqara_p3">ص٣ — آيات ٦–١٦</option>
      <option value="baqara_p4">ص٤ — آيات ١٧–٢٤</option>
      <option value="baqara_p5">ص٥ — آيات ٢٥–٢٩</option>
      <option value="baqara_p6">ص٦ — آيات ٣٠–٣٨</option>
      <option value="baqara_p7">ص٧ — آيات ٣٩–٤٦</option>
      <option value="baqara_p8">ص٨ — آيات ٤٧–٥٧</option>
      <option value="baqara_p9">ص٩ — آيات ٥٨–٦١</option>
      <option value="baqara_p42">ص٤٢ — آيات ٢٥٣–٢٥٦ (آية الكرسي)</option>
      <option value="baqara_p49">ص٤٩ — آيات ٢٨٣–٢٨٦ (ختام البقرة)</option>
    </optgroup>
    <optgroup label="جزء عمّ">
      <option value="annaba">سورة النبأ كاملة (٤٠ آية)</option>
      <option value="annaziat">سورة النازعات كاملة (٤٦ آية)</option>
      <option value="abasa">سورة عبس كاملة (٤٢ آية)</option>
    </optgroup>
  </select>
  <div class="selected-info" id="selectedInfo"></div>
</div>

<div class="rec-card" id="recCard">
  <div class="rec-desc">
    اضغط 🎤 وابدأ التلاوة من أي آية<br>
    توقف متى شئت — سنحدد موضعك تلقائياً<br>
    🟢 صح &nbsp;|&nbsp; 🔴 غلط &nbsp;|&nbsp; ➖ محذوف
  </div>
  <button class="rec-btn" id="recBtn" onclick="toggleRec()">اختر سورة أولاً</button>
  <button class="clear-btn" id="clearBtn" onclick="clearAll()">🗑️ مسح والبدء من جديد</button>
  <div class="transcript-box" id="transcriptBox"></div>
  <button class="check-btn" id="checkBtn" onclick="checkRecitation()">✓ تحقق من التلاوة</button>
</div>

<div class="result-card" id="resultCard">
  <div class="result-header">
    <div class="result-title" id="resultTitle">النتيجة</div>
    <div class="result-stats">
      <div class="stat ok" id="statOk">✓ ٠</div>
      <div class="stat err" id="statErr">✗ ٠</div>
    </div>
  </div>
  <div class="score-bar"><div class="score-fill" id="scoreFill" style="width:0%"></div></div>
  <div class="where-msg" id="whereMsg"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#c3e6cb;border:1px solid #155724"></div>صحيحة</div>
    <div class="legend-item"><div class="legend-dot" style="background:#c0392b"></div>خاطئة</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f0f0f0;border:1px solid #ccc"></div>محذوفة</div>
  </div>
  <div class="ayah-display" id="ayahDisplay"></div>
  <button class="retry-btn" onclick="retryRec()">🔄 إعادة التسجيل</button>
</div>

<script>
// ===== نصوص السور =====
const TEXTS = {
  fatiha: `بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ ٱلْحَمْدُ لِلَّهِ رَبِّ ٱلْعَٰلَمِينَ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ مَٰلِكِ يَوْمِ ٱلدِّينِ إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ ٱهْدِنَا ٱلصِّرَٰطَ ٱلْمُسْتَقِيمَ صِرَٰطَ ٱلَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ ٱلْمَغْضُوبِ عَلَيْهِمْ وَلَا ٱلضَّآلِّينَ`,

  baqara_p2: `بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ الٓمٓ ذَٰلِكَ ٱلْكِتَٰبُ لَا رَيْبَ فِيهِ هُدًى لِّلْمُتَّقِينَ ٱلَّذِينَ يُؤْمِنُونَ بِٱلْغَيْبِ وَيُقِيمُونَ ٱلصَّلَوٰةَ وَمِمَّا رَزَقْنَٰهُمْ يُنفِقُونَ وَٱلَّذِينَ يُؤْمِنُونَ بِمَآ أُنزِلَ إِلَيْكَ وَمَآ أُنزِلَ مِن قَبْلِكَ وَبِٱلْءَاخِرَةِ هُمْ يُوقِنُونَ أُوْلَٰٓئِكَ عَلَىٰ هُدًى مِّن رَّبِّهِمْ وَأُوْلَٰٓئِكَ هُمُ ٱلْمُفْلِحُونَ`,

  baqara_p3: `إِنَّ ٱلَّذِينَ كَفَرُوا سَوَآءٌ عَلَيْهِمْ ءَأَنذَرْتَهُمْ أَمْ لَمْ تُنذِرْهُمْ لَا يُؤْمِنُونَ خَتَمَ ٱللَّهُ عَلَىٰ قُلُوبِهِمْ وَعَلَىٰ سَمْعِهِمْ وَعَلَىٰٓ أَبْصَٰرِهِمْ غِشَٰوَةٌ وَلَهُمْ عَذَابٌ عَظِيمٌ وَمِنَ ٱلنَّاسِ مَن يَقُولُ ءَامَنَّا بِٱللَّهِ وَبِٱلْيَوْمِ ٱلْءَاخِرِ وَمَا هُم بِمُؤْمِنِينَ يُخَٰدِعُونَ ٱللَّهَ وَٱلَّذِينَ ءَامَنُوا وَمَا يَخْدَعُونَ إِلَّآ أَنفُسَهُمْ وَمَا يَشْعُرُونَ فِى قُلُوبِهِم مَّرَضٌ فَزَادَهُمُ ٱللَّهُ مَرَضًا وَلَهُمْ عَذَابٌ أَلِيمٌ بِمَا كَانُوا يَكْذِبُونَ وَإِذَا قِيلَ لَهُمْ لَا تُفْسِدُوا فِى ٱلْأَرْضِ قَالُوٓا إِنَّمَا نَحْنُ مُصْلِحُونَ أَلَآ إِنَّهُمْ هُمُ ٱلْمُفْسِدُونَ وَلَٰكِن لَّا يَشْعُرُونَ وَإِذَا قِيلَ لَهُمْ ءَامِنُوا كَمَآ ءَامَنَ ٱلنَّاسُ قَالُوٓا أَنُؤْمِنُ كَمَآ ءَامَنَ ٱلسُّفَهَآءُ أَلَآ إِنَّهُمْ هُمُ ٱلسُّفَهَآءُ وَلَٰكِن لَّا يَعْلَمُونَ`,

  baqara_p4: `وَإِذَا لَقُوا ٱلَّذِينَ ءَامَنُوا قَالُوٓا ءَامَنَّا وَإِذَا خَلَوْا إِلَىٰ شَيَٰطِينِهِمْ قَالُوٓا إِنَّا مَعَكُمْ إِنَّمَا نَحْنُ مُسْتَهْزِءُونَ ٱللَّهُ يَسْتَهْزِئُ بِهِمْ وَيَمُدُّهُمْ فِى طُغْيَٰنِهِمْ يَعْمَهُونَ أُوْلَٰٓئِكَ ٱلَّذِينَ ٱشْتَرَوُا ٱلضَّلَٰلَةَ بِٱلْهُدَىٰ فَمَا رَبِحَت تِّجَٰرَتُهُمْ وَمَا كَانُوا مُهْتَدِينَ مَثَلُهُمْ كَمَثَلِ ٱلَّذِى ٱسْتَوْقَدَ نَارًا فَلَمَّآ أَضَآءَتْ مَا حَوْلَهُۥ ذَهَبَ ٱللَّهُ بِنُورِهِمْ وَتَرَكَهُمْ فِى ظُلُمَٰتٍ لَّا يُبْصِرُونَ صُمٌّ بُكْمٌ عُمْىٌ فَهُمْ لَا يَرْجِعُونَ أَوْ كَصَيِّبٍ مِّنَ ٱلسَّمَآءِ فِيهِ ظُلُمَٰتٌ وَرَعْدٌ وَبَرْقٌ يَجْعَلُونَ أَصَٰبِعَهُمْ فِىٓ ءَاذَانِهِم مِّنَ ٱلصَّوَٰعِقِ حَذَرَ ٱلْمَوْتِ وَٱللَّهُ مُحِيطٌ بِٱلْكَٰفِرِينَ يَكَادُ ٱلْبَرْقُ يَخْطَفُ أَبْصَٰرَهُمْ كُلَّمَآ أَضَآءَ لَهُم مَّشَوْا فِيهِ وَإِذَآ أَظْلَمَ عَلَيْهِمْ قَامُوا وَلَوْ شَآءَ ٱللَّهُ لَذَهَبَ بِسَمْعِهِمْ وَأَبْصَٰرِهِمْ إِنَّ ٱللَّهَ عَلَىٰ كُلِّ شَىْءٍ قَدِيرٌ`,

  baqara_p5: `يَٰٓأَيُّهَا ٱلنَّاسُ ٱعْبُدُوا رَبَّكُمُ ٱلَّذِى خَلَقَكُمْ وَٱلَّذِينَ مِن قَبْلِكُمْ لَعَلَّكُمْ تَتَّقُونَ ٱلَّذِى جَعَلَ لَكُمُ ٱلْأَرْضَ فِرَٰشًا وَٱلسَّمَآءَ بِنَآءً وَأَنزَلَ مِنَ ٱلسَّمَآءِ مَآءً فَأَخْرَجَ بِهِۦ مِنَ ٱلثَّمَرَٰتِ رِزْقًا لَّكُمْ فَلَا تَجْعَلُوا لِلَّهِ أَندَادًا وَأَنتُمْ تَعْلَمُونَ وَإِن كُنتُمْ فِى رَيْبٍ مِّمَّا نَزَّلْنَا عَلَىٰ عَبْدِنَا فَأْتُوا بِسُورَةٍ مِّن مِّثْلِهِۦ وَٱدْعُوا شُهَدَآءَكُم مِّن دُونِ ٱللَّهِ إِن كُنتُمْ صَٰدِقِينَ فَإِن لَّمْ تَفْعَلُوا وَلَن تَفْعَلُوا فَٱتَّقُوا ٱلنَّارَ ٱلَّتِى وَقُودُهَا ٱلنَّاسُ وَٱلْحِجَارَةُ أُعِدَّتْ لِلْكَٰفِرِينَ وَبَشِّرِ ٱلَّذِينَ ءَامَنُوا وَعَمِلُوا ٱلصَّٰلِحَٰتِ أَنَّ لَهُمْ جَنَّٰتٍ تَجْرِى مِن تَحْتِهَا ٱلْأَنْهَٰرُ`,

  baqara_p6: `وَإِذْ قَالَ رَبُّكَ لِلْمَلَٰٓئِكَةِ إِنِّى جَاعِلٌ فِى ٱلْأَرْضِ خَلِيفَةً قَالُوٓا أَتَجْعَلُ فِيهَا مَن يُفْسِدُ فِيهَا وَيَسْفِكُ ٱلدِّمَآءَ وَنَحْنُ نُسَبِّحُ بِحَمْدِكَ وَنُقَدِّسُ لَكَ قَالَ إِنِّىٓ أَعْلَمُ مَا لَا تَعْلَمُونَ وَعَلَّمَ ءَادَمَ ٱلْأَسْمَآءَ كُلَّهَا ثُمَّ عَرَضَهُمْ عَلَى ٱلْمَلَٰٓئِكَةِ فَقَالَ أَنۢبِـُٔونِى بِأَسْمَآءِ هَٰٓؤُلَآءِ إِن كُنتُمْ صَٰدِقِينَ قَالُوا سُبْحَٰنَكَ لَا عِلْمَ لَنَآ إِلَّا مَا عَلَّمْتَنَآ إِنَّكَ أَنتَ ٱلْعَلِيمُ ٱلْحَكِيمُ قَالَ يَٰٓـَٔادَمُ أَنۢبِئْهُم بِأَسْمَآئِهِمْ فَلَمَّآ أَنۢبَأَهُم بِأَسْمَآئِهِمْ قَالَ أَلَمْ أَقُل لَّكُمْ إِنِّىٓ أَعْلَمُ غَيْبَ ٱلسَّمَٰوَٰتِ وَٱلْأَرْضِ وَأَعْلَمُ مَا تُبْدُونَ وَمَا كُنتُمْ تَكْتُمُونَ`,

  baqara_p7: `إِنَّ ٱلَّذِينَ كَفَرُوا وَمَاتُوا وَهُمْ كُفَّارٌ أُوْلَٰٓئِكَ عَلَيْهِمْ لَعْنَةُ ٱللَّهِ وَٱلْمَلَٰٓئِكَةِ وَٱلنَّاسِ أَجْمَعِينَ خَٰلِدِينَ فِيهَا لَا يُخَفَّفُ عَنْهُمُ ٱلْعَذَابُ وَلَا هُمْ يُنظَرُونَ وَإِلَٰهُكُمْ إِلَٰهٌ وَٰحِدٌ لَّآ إِلَٰهَ إِلَّا هُوَ ٱلرَّحْمَٰنُ ٱلرَّحِيمُ إِنَّ فِى خَلْقِ ٱلسَّمَٰوَٰتِ وَٱلْأَرْضِ وَٱخْتِلَٰفِ ٱلَّيْلِ وَٱلنَّهَارِ وَٱلْفُلْكِ ٱلَّتِى تَجْرِى فِى ٱلْبَحْرِ بِمَا يَنفَعُ ٱلنَّاسَ وَمَآ أَنزَلَ ٱللَّهُ مِنَ ٱلسَّمَآءِ مِن مَّآءٍ فَأَحْيَا بِهِ ٱلْأَرْضَ بَعْدَ مَوْتِهَا وَبَثَّ فِيهَا مِن كُلِّ دَآبَّةٍ وَتَصْرِيفِ ٱلرِّيَٰحِ وَٱلسَّحَابِ ٱلْمُسَخَّرِ بَيْنَ ٱلسَّمَآءِ وَٱلْأَرْضِ لَءَايَٰتٍ لِّقَوْمٍ يَعْقِلُونَ`,

  baqara_p8: `يَٰٓأَيُّهَا ٱلنَّاسُ كُلُوا مِمَّا فِى ٱلْأَرْضِ حَلَٰلًا طَيِّبًا وَلَا تَتَّبِعُوا خُطُوَٰتِ ٱلشَّيْطَٰنِ إِنَّهُۥ لَكُمْ عَدُوٌّ مُّبِينٌ إِنَّمَا يَأْمُرُكُم بِٱلسُّوٓءِ وَٱلْفَحْشَآءِ وَأَن تَقُولُوا عَلَى ٱللَّهِ مَا لَا تَعْلَمُونَ وَإِذَا قِيلَ لَهُمُ ٱتَّبِعُوا مَآ أَنزَلَ ٱللَّهُ قَالُوا بَلْ نَتَّبِعُ مَآ أَلْفَيْنَا عَلَيْهِ ءَابَآءَنَآ أَوَلَوْ كَانَ ءَابَآؤُهُمْ لَا يَعْقِلُونَ شَيْـًٔا وَلَا يَهْتَدُونَ`,

  baqara_p9: `وَإِذْ قُلْنَا ٱدْخُلُوا هَٰذِهِ ٱلْقَرْيَةَ فَكُلُوا مِنْهَا حَيْثُ شِئْتُمْ رَغَدًا وَٱدْخُلُوا ٱلْبَابَ سُجَّدًا وَقُولُوا حِطَّةٌ نَّغْفِرْ لَكُمْ خَطَٰيَٰكُمْ وَسَنَزِيدُ ٱلْمُحْسِنِينَ فَبَدَّلَ ٱلَّذِينَ ظَلَمُوا قَوْلًا غَيْرَ ٱلَّذِى قِيلَ لَهُمْ فَأَنزَلْنَا عَلَى ٱلَّذِينَ ظَلَمُوا رِجْزًا مِّنَ ٱلسَّمَآءِ بِمَا كَانُوا يَفْسُقُونَ وَإِذِ ٱسْتَسْقَىٰ مُوسَىٰ لِقَوْمِهِۦ فَقُلْنَا ٱضْرِب بِّعَصَاكَ ٱلْحَجَرَ فَٱنفَجَرَتْ مِنْهُ ٱثْنَتَا عَشْرَةَ عَيْنًا قَدْ عَلِمَ كُلُّ أُنَاسٍ مَّشْرَبَهُمْ كُلُوا وَٱشْرَبُوا مِن رِّزْقِ ٱللَّهِ وَلَا تَعْثَوْا فِى ٱلْأَرْضِ مُفْسِدِينَ`,

  baqara_p42: `تِلْكَ ٱلرُّسُلُ فَضَّلْنَا بَعْضَهُمْ عَلَىٰ بَعْضٍ مِّنْهُم مَّن كَلَّمَ ٱللَّهُ وَرَفَعَ بَعْضَهُمْ دَرَجَٰتٍ وَءَاتَيْنَا عِيسَى ٱبْنَ مَرْيَمَ ٱلْبَيِّنَٰتِ وَأَيَّدْنَٰهُ بِرُوحِ ٱلْقُدُسِ وَلَوْ شَآءَ ٱللَّهُ مَا ٱقْتَتَلَ ٱلَّذِينَ مِنۢ بَعْدِهِم مِّنۢ بَعْدِ مَا جَآءَتْهُمُ ٱلْبَيِّنَٰتُ وَلَٰكِنِ ٱخْتَلَفُوا فَمِنْهُم مَّنْ ءَامَنَ وَمِنْهُم مَّن كَفَرَ وَلَوْ شَآءَ ٱللَّهُ مَا ٱقْتَتَلُوا وَلَٰكِنَّ ٱللَّهَ يَفْعَلُ مَا يُرِيدُ يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُوٓا أَنفِقُوا مِمَّا رَزَقْنَٰكُم مِّن قَبْلِ أَن يَأْتِىَ يَوْمٌ لَّا بَيْعٌ فِيهِ وَلَا خُلَّةٌ وَلَا شَفَٰعَةٌ وَٱلْكَٰفِرُونَ هُمُ ٱلظَّٰلِمُونَ ٱللَّهُ لَآ إِلَٰهَ إِلَّا هُوَ ٱلْحَىُّ ٱلْقَيُّومُ لَا تَأْخُذُهُۥ سِنَةٌ وَلَا نَوْمٌ لَّهُۥ مَا فِى ٱلسَّمَٰوَٰتِ وَمَا فِى ٱلْأَرْضِ مَن ذَا ٱلَّذِى يَشْفَعُ عِندَهُۥٓ إِلَّا بِإِذْنِهِۦ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ وَلَا يُحِيطُونَ بِشَىْءٍ مِّنْ عِلْمِهِۦٓ إِلَّا بِمَا شَآءَ وَسِعَ كُرْسِيُّهُ ٱلسَّمَٰوَٰتِ وَٱلْأَرْضَ وَلَا يَـُٔودُهُۥ حِفْظُهُمَا وَهُوَ ٱلْعَلِىُّ ٱلْعَظِيمُ لَآ إِكْرَاهَ فِى ٱلدِّينِ قَد تَّبَيَّنَ ٱلرُّشْدُ مِنَ ٱلْغَىِّ فَمَن يَكْفُرْ بِٱلطَّٰغُوتِ وَيُؤْمِنۢ بِٱللَّهِ فَقَدِ ٱسْتَمْسَكَ بِٱلْعُرْوَةِ ٱلْوُثْقَىٰ لَا ٱنفِصَامَ لَهَا وَٱللَّهُ سَمِيعٌ عَلِيمٌ`,

  baqara_p49: `وَإِن كُنتُمْ عَلَىٰ سَفَرٍ وَلَمْ تَجِدُوا كَاتِبًا فَرِهَٰنٌ مَّقْبُوضَةٌ فَإِنْ أَمِنَ بَعْضُكُم بَعْضًا فَلْيُؤَدِّ ٱلَّذِى ٱؤْتُمِنَ أَمَٰنَتَهُۥ وَلْيَتَّقِ ٱللَّهَ رَبَّهُۥ وَلَا تَكْتُمُوا ٱلشَّهَٰدَةَ وَمَن يَكْتُمْهَا فَإِنَّهُۥٓ ءَاثِمٌ قَلْبُهُۥ وَٱللَّهُ بِمَا تَعْمَلُونَ عَلِيمٌ لِلَّهِ مَا فِى ٱلسَّمَٰوَٰتِ وَمَا فِى ٱلْأَرْضِ وَإِن تُبْدُوا مَا فِىٓ أَنفُسِكُمْ أَوْ تُخْفُوهُ يُحَاسِبْكُم بِهِ ٱللَّهُ فَيَغْفِرُ لِمَن يَشَآءُ وَيُعَذِّبُ مَن يَشَآءُ وَٱللَّهُ عَلَىٰ كُلِّ شَىْءٍ قَدِيرٌ ءَامَنَ ٱلرَّسُولُ بِمَآ أُنزِلَ إِلَيْهِ مِن رَّبِّهِۦ وَٱلْمُؤْمِنُونَ كُلٌّ ءَامَنَ بِٱللَّهِ وَمَلَٰٓئِكَتِهِۦ وَكُتُبِهِۦ وَرُسُلِهِۦ لَا نُفَرِّقُ بَيْنَ أَحَدٍ مِّن رُّسُلِهِۦ وَقَالُوا سَمِعْنَا وَأَطَعْنَا غُفْرَانَكَ رَبَّنَا وَإِلَيْكَ ٱلْمَصِيرُ لَا يُكَلِّفُ ٱللَّهُ نَفْسًا إِلَّا وُسْعَهَا لَهَا مَا كَسَبَتْ وَعَلَيْهَا مَا ٱكْتَسَبَتْ رَبَّنَا لَا تُؤَاخِذْنَآ إِن نَّسِينَآ أَوْ أَخْطَأْنَا رَبَّنَا وَلَا تَحْمِلْ عَلَيْنَآ إِصْرًا كَمَا حَمَلْتَهُۥ عَلَى ٱلَّذِينَ مِن قَبْلِنَا رَبَّنَا وَلَا تُحَمِّلْنَا مَا لَا طَاقَةَ لَنَا بِهِۦ وَٱعْفُ عَنَّا وَٱغْفِرْ لَنَا وَٱرْحَمْنَآ أَنتَ مَوْلَىٰنَا فَٱنصُرْنَا عَلَى ٱلْقَوْمِ ٱلْكَٰفِرِينَ`,

  annaba: `عَمَّ يَتَسَآءَلُونَ عَنِ ٱلنَّبَإِ ٱلْعَظِيمِ ٱلَّذِى هُمْ فِيهِ مُخْتَلِفُونَ كَلَّا سَيَعْلَمُونَ ثُمَّ كَلَّا سَيَعْلَمُونَ أَلَمْ نَجْعَلِ ٱلْأَرْضَ مِهَٰدًا وَٱلْجِبَالَ أَوْتَادًا وَخَلَقْنَٰكُمْ أَزْوَٰجًا وَجَعَلْنَا نَوْمَكُمْ سُبَاتًا وَجَعَلْنَا ٱلَّيْلَ لِبَاسًا وَجَعَلْنَا ٱلنَّهَارَ مَعَاشًا وَبَنَيْنَا فَوْقَكُمْ سَبْعًا شِدَادًا وَجَعَلْنَا سِرَاجًا وَهَّاجًا وَأَنزَلْنَا مِنَ ٱلْمُعْصِرَٰتِ مَآءً ثَجَّاجًا لِّنُخْرِجَ بِهِۦ حَبًّا وَنَبَاتًا وَجَنَّٰتٍ أَلْفَافًا إِنَّ يَوْمَ ٱلْفَصْلِ كَانَ مِيقَٰتًا يَوْمَ يُنفَخُ فِى ٱلصُّورِ فَتَأْتُونَ أَفْوَاجًا وَفُتِحَتِ ٱلسَّمَآءُ فَكَانَتْ أَبْوَٰبًا وَسُيِّرَتِ ٱلْجِبَالُ فَكَانَتْ سَرَابًا إِنَّ جَهَنَّمَ كَانَتْ مِرْصَادًا لِّلطَّٰغِينَ مَـَٔابًا لَّٰبِثِينَ فِيهَآ أَحْقَابًا لَّا يَذُوقُونَ فِيهَا بَرْدًا وَلَا شَرَابًا إِلَّا حَمِيمًا وَغَسَّاقًا جَزَآءً وِفَاقًا إِنَّهُمْ كَانُوا لَا يَرْجُونَ حِسَابًا وَكَذَّبُوا بِـَٔايَٰتِنَا كِذَّابًا وَكُلَّ شَىْءٍ أَحْصَيْنَٰهُ كِتَٰبًا فَذُوقُوا فَلَن نَّزِيدَكُمْ إِلَّا عَذَابًا إِنَّ لِلْمُتَّقِينَ مَفَازًا حَدَآئِقَ وَأَعْنَٰبًا وَكَوَاعِبَ أَتْرَابًا وَكَأْسًا دِهَاقًا لَّا يَسْمَعُونَ فِيهَا لَغْوًا وَلَا كِذَّٰبًا جَزَآءً مِّن رَّبِّكَ عَطَآءً حِسَابًا رَّبِّ ٱلسَّمَٰوَٰتِ وَٱلْأَرْضِ وَمَا بَيْنَهُمَا ٱلرَّحْمَٰنِ لَا يَمْلِكُونَ مِنْهُ خِطَابًا يَوْمَ يَقُومُ ٱلرُّوحُ وَٱلْمَلَٰٓئِكَةُ صَفًّا لَّا يَتَكَلَّمُونَ إِلَّا مَنْ أَذِنَ لَهُ ٱلرَّحْمَٰنُ وَقَالَ صَوَابًا ذَٰلِكَ ٱلْيَوْمُ ٱلْحَقُّ فَمَن شَآءَ ٱتَّخَذَ إِلَىٰ رَبِّهِۦ مَـَٔابًا إِنَّآ أَنذَرْنَٰكُمْ عَذَابًا قَرِيبًا يَوْمَ يَنظُرُ ٱلْمَرْءُ مَا قَدَّمَتْ يَدَاهُ وَيَقُولُ ٱلْكَافِرُ يَٰلَيْتَنِى كُنتُ تُرَٰبًا`,

  annaziat: `وَٱلنَّٰزِعَٰتِ غَرْقًا وَٱلنَّٰشِطَٰتِ نَشْطًا وَٱلسَّٰبِحَٰتِ سَبْحًا فَٱلسَّٰبِقَٰتِ سَبْقًا فَٱلْمُدَبِّرَٰتِ أَمْرًا يَوْمَ تَرْجُفُ ٱلرَّاجِفَةُ تَتْبَعُهَا ٱلرَّادِفَةُ قُلُوبٌ يَوْمَئِذٍ وَاجِفَةٌ أَبْصَٰرُهَا خَٰشِعَةٌ يَقُولُونَ أَءِنَّا لَمَرْدُودُونَ فِى ٱلْحَافِرَةِ أَءِذَا كُنَّا عِظَٰمًا نَّخِرَةً قَالُوا تِلْكَ إِذًا كَرَّةٌ خَاسِرَةٌ فَإِنَّمَا هِىَ زَجْرَةٌ وَٰحِدَةٌ فَإِذَا هُم بِٱلسَّاهِرَةِ هَلْ أَتَىٰكَ حَدِيثُ مُوسَىٰ إِذْ نَادَىٰهُ رَبُّهُۥ بِٱلْوَادِ ٱلْمُقَدَّسِ طُوًى ٱذْهَبْ إِلَىٰ فِرْعَوْنَ إِنَّهُۥ طَغَىٰ فَقُلْ هَل لَّكَ إِلَىٰٓ أَن تَزَكَّىٰ وَأَهْدِيَكَ إِلَىٰ رَبِّكَ فَتَخْشَىٰ فَأَرَىٰهُ ٱلْءَايَةَ ٱلْكُبْرَىٰ فَكَذَّبَ وَعَصَىٰ ثُمَّ أَدْبَرَ يَسْعَىٰ فَحَشَرَ فَنَادَىٰ فَقَالَ أَنَا۠ رَبُّكُمُ ٱلْأَعْلَىٰ فَأَخَذَهُ ٱللَّهُ نَكَالَ ٱلْءَاخِرَةِ وَٱلْأُولَىٰ إِنَّ فِى ذَٰلِكَ لَعِبْرَةً لِّمَن يَخْشَىٰ ءَأَنتُمْ أَشَدُّ خَلْقًا أَمِ ٱلسَّمَآءُ بَنَٰهَا رَفَعَ سَمْكَهَا فَسَوَّىٰهَا وَأَغْطَشَ لَيْلَهَا وَأَخْرَجَ ضُحَٰهَا وَٱلْأَرْضَ بَعْدَ ذَٰلِكَ دَحَٰهَا أَخْرَجَ مِنْهَا مَآءَهَا وَمَرْعَٰهَا وَٱلْجِبَالَ أَرْسَٰهَا مَتَٰعًا لَّكُمْ وَلِأَنْعَٰمِكُمْ فَإِذَا جَآءَتِ ٱلطَّآمَّةُ ٱلْكُبْرَىٰ يَوْمَ يَتَذَكَّرُ ٱلْإِنسَٰنُ مَا سَعَىٰ وَبُرِّزَتِ ٱلْجَحِيمُ لِمَن يَرَىٰ فَأَمَّا مَن طَغَىٰ وَءَاثَرَ ٱلْحَيَوٰةَ ٱلدُّنْيَا فَإِنَّ ٱلْجَحِيمَ هِىَ ٱلْمَأْوَىٰ وَأَمَّا مَنْ خَافَ مَقَامَ رَبِّهِۦ وَنَهَى ٱلنَّفْسَ عَنِ ٱلْهَوَىٰ فَإِنَّ ٱلْجَنَّةَ هِىَ ٱلْمَأْوَىٰ يَسْـَٔلُونَكَ عَنِ ٱلسَّاعَةِ أَيَّانَ مُرْسَٰهَا فِيمَ أَنتَ مِن ذِكْرَٰهَآ إِلَىٰ رَبِّكَ مُنتَهَٰهَآ إِنَّمَآ أَنتَ مُنذِرُ مَن يَخْشَٰهَا كَأَنَّهُمْ يَوْمَ يَرَوْنَهَا لَمْ يَلْبَثُوٓا إِلَّا عَشِيَّةً أَوْ ضُحَٰهَا`,

  abasa: `عَبَسَ وَتَوَلَّىٰٓ أَن جَآءَهُ ٱلْأَعْمَىٰ وَمَا يُدْرِيكَ لَعَلَّهُۥ يَزَّكَّىٰٓ أَوْ يَذَّكَّرُ فَتَنفَعَهُ ٱلذِّكْرَىٰ أَمَّا مَنِ ٱسْتَغْنَىٰ فَأَنتَ لَهُۥ تَصَدَّىٰ وَمَا عَلَيْكَ أَلَّا يَزَّكَّىٰ وَأَمَّا مَن جَآءَكَ يَسْعَىٰ وَهُوَ يَخْشَىٰ فَأَنتَ عَنْهُ تَلَهَّىٰ كَلَّآ إِنَّهَا تَذْكِرَةٌ فَمَن شَآءَ ذَكَرَهُۥ فِى صُحُفٍ مُّكَرَّمَةٍ مَّرْفُوعَةٍ مُّطَهَّرَةٍ بِأَيْدِى سَفَرَةٍ كِرَامٍ بَرَرَةٍ قُتِلَ ٱلْإِنسَٰنُ مَآ أَكْفَرَهُۥ مِنْ أَىِّ شَىْءٍ خَلَقَهُۥ مِن نُّطْفَةٍ خَلَقَهُۥ فَقَدَّرَهُۥ ثُمَّ ٱلسَّبِيلَ يَسَّرَهُۥ ثُمَّ أَمَاتَهُۥ فَأَقْبَرَهُۥ ثُمَّ إِذَا شَآءَ أَنشَرَهُۥ كَلَّا لَمَّا يَقْضِ مَآ أَمَرَهُۥ فَلْيَنظُرِ ٱلْإِنسَٰنُ إِلَىٰ طَعَامِهِۦٓ أَنَّا صَبَبْنَا ٱلْمَآءَ صَبًّا ثُمَّ شَقَقْنَا ٱلْأَرْضَ شَقًّا فَأَنبَتْنَا فِيهَا حَبًّا وَعِنَبًا وَقَضْبًا وَزَيْتُونًا وَنَخْلًا وَحَدَآئِقَ غُلْبًا وَفَٰكِهَةً وَأَبًّا مَّتَٰعًا لَّكُمْ وَلِأَنْعَٰمِكُمْ فَإِذَا جَآءَتِ ٱلصَّآخَّةُ يَوْمَ يَفِرُّ ٱلْمَرْءُ مِنْ أَخِيهِ وَأُمِّهِۦ وَأَبِيهِ وَصَٰحِبَتِهِۦ وَبَنِيهِ لِكُلِّ ٱمْرِئٍ مِّنْهُمْ يَوْمَئِذٍ شَأْنٌ يُغْنِيهِ وُجُوهٌ يَوْمَئِذٍ مُّسْفِرَةٌ ضَاحِكَةٌ مُّسْتَبْشِرَةٌ وَوُجُوهٌ يَوْمَئِذٍ عَلَيْهَا غَبَرَةٌ تَرْهَقُهَا قَتَرَةٌ أُوْلَٰٓئِكَ هُمُ ٱلْكَفَرَةُ ٱلْفَجَرَةُ`
};

  baqara_p9:'البقرة ص٩ — آيات ٥٨–٦١',
  baqara_p42:'البقرة ص٤٢ — آيات ٢٥٣–٢٥٦ (آية الكرسي)',
  baqara_p49:'البقرة ص٤٩ — آيات ٢٨٣–٢٨٦',
  annaba:'سورة النبأ كاملة (٤٠ آية)',
  annaziat:'سورة النازعات كاملة (٤٦ آية)',
  abasa:'سورة عبس كاملة (٤٢ آية)',
};

let currentKey = '';
let refWords = [];

function norm(s){
  return s
    .replace(/[\u064B-\u065F\u0670\u0671]/g,'')
    .replace(/[أإآا]/g,'ا')
    .replace(/ة/g,'ه')
    .replace(/ى/g,'ي')
    .replace(/[ئؤ]/g,'ء')
    .replace(/[^\u0600-\u06FF]/g,'')
    .trim();
}

function onSelectSurah(){
  const sel = document.getElementById('surahSelect');
  currentKey = sel.value;
  if(!currentKey){ document.getElementById('selectedInfo').style.display='none'; return; }
  refWords = TEXTS[currentKey].split(/\s+/).filter(w=>w.length>0);
  document.getElementById('selectedInfo').textContent = '✓ ' + SURAH_NAMES[currentKey] + ' — ' + refWords.length + ' كلمة';
  document.getElementById('selectedInfo').style.display='block';
  document.getElementById('recBtn').textContent='🎤 اضغط وابدأ التلاوة';
  document.getElementById('recBtn').disabled=false;
  clearAll();
}

function findStart(userWords){
  if(!userWords.length) return 0;
  for(let i=0;i<=refWords.length-2;i++){
    const u2=userWords.slice(0,2).map(norm).join(' ');
    const r2=refWords.slice(i,i+2).map(norm).join(' ');
    if(u2===r2) return i;
  }
  // كلمة واحدة
  const u1=norm(userWords[0]);
  for(let i=0;i<refWords.length;i++){
    if(norm(refWords[i])===u1) return i;
  }
  return 0;
}

function compareWords(userWords, ref){
  const res=[];
  let ui=0,ri=0;
  while(ri<ref.length){
    if(ui>=userWords.length){res.push({ref:ref[ri],status:'missing'});ri++;}
    else if(norm(userWords[ui])===norm(ref[ri])){res.push({ref:ref[ri],user:userWords[ui],status:'ok'});ui++;ri++;}
    else{
      // look-ahead: skip user word
      if(ui+1<userWords.length && norm(userWords[ui+1])===norm(ref[ri])){ui++;continue;}
      res.push({ref:ref[ri],user:userWords[ui],status:'err'});
      ui++;ri++;
    }
  }
  return res;
}

// ===== التسجيل =====
const SpeechAPI=window.SpeechRecognition||window.webkitSpeechRecognition;
const isSecure=location.protocol==='https:'||location.hostname==='localhost';
let recInst=null,recognizing=false,savedText='',currentText='';

function makeRec(){
  const r=new SpeechAPI();
  r.lang='ar-SA';r.continuous=true;r.interimResults=false;
  r.onstart=()=>{recognizing=true;currentText='';setBtn('rec');showBox();};
  r.onresult=e=>{
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)currentText=(currentText+' '+e.results[i][0].transcript).trim();
    }
    const full=savedText?(savedText+' '+currentText).trim():currentText;
    document.getElementById('transcriptBox').textContent=full;
    document.getElementById('checkBtn').style.display='block';
    document.getElementById('clearBtn').style.display='block';
  };
  r.onerror=e=>{if(e.error!=='no-speech'&&e.error!=='aborted')recognizing=false;};
  r.onend=()=>{
    recognizing=false;
    if(currentText){savedText=savedText?(savedText+' '+currentText).trim():currentText;currentText='';}
    setBtn(savedText?'paused':'idle');
  };
  return r;
}

function toggleRec(){
  if(!currentKey){alert('اختاري سورة أولاً');return;}
  if(!SpeechAPI||!isSecure){alert('التسجيل يعمل على الموقع الرسمي (https) فقط');return;}
  if(recognizing){
    recognizing=false;
    if(currentText){savedText=savedText?(savedText+' '+currentText).trim():currentText;currentText='';}
    try{recInst.stop();}catch(e){}
    setBtn('paused');return;
  }
  recInst=makeRec();
  try{recInst.start();}catch(e){setBtn('idle');}
}

function setBtn(state){
  const btn=document.getElementById('recBtn');
  if(state==='rec'){btn.textContent='⏸ إيقاف مؤقت';btn.className='rec-btn recording';}
  else if(state==='paused'){btn.textContent='▶️ استمر في التلاوة';btn.className='rec-btn paused';}
  else{btn.textContent='🎤 اضغط وابدأ التلاوة';btn.className='rec-btn';}
}
function showBox(){document.getElementById('transcriptBox').style.display='block';}

function clearAll(){
  if(recognizing){try{recInst.stop();}catch(e){}recognizing=false;}
  savedText='';currentText='';
  document.getElementById('transcriptBox').textContent='';
  document.getElementById('transcriptBox').style.display='none';
  document.getElementById('checkBtn').style.display='none';
  document.getElementById('clearBtn').style.display='none';
  document.getElementById('resultCard').style.display='none';
  setBtn('idle');
}
function retryRec(){clearAll();}

function checkRecitation(){
  const text=(savedText||document.getElementById('transcriptBox').textContent).trim();
  if(!text)return;
  if(recognizing){try{recInst.stop();}catch(e){}recognizing=false;}
  setBtn('idle');

  const userWords=text.split(/\s+/).filter(w=>w.length>0);
  const startIdx=findStart(userWords);
  const ref=refWords.slice(startIdx,startIdx+userWords.length+10);

  const results=compareWords(userWords,ref);
  const ok=results.filter(r=>r.status==='ok').length;
  const bad=results.filter(r=>r.status!=='ok').length;
  const total=results.length;
  const pct=Math.round(ok/total*100);

  // رسالة الموضع
  let where='';
  if(startIdx===0) where='بدأتِ من أول السورة';
  else where=`📍 بدأتِ من الكلمة ${startIdx+1} تقريباً`;

  document.getElementById('resultCard').style.display='block';
  document.getElementById('whereMsg').textContent=where;
  document.getElementById('statOk').textContent=`✓ ${ok}`;
  document.getElementById('statErr').textContent=`✗ ${bad}`;
  const fill=document.getElementById('scoreFill');
  fill.style.width=pct+'%';
  fill.style.background=pct>=80?'#4a7c4a':pct>=60?'#e67e22':'#c0392b';
  document.getElementById('resultTitle').textContent=
    pct===100?'🌟 ممتاز! تلاوة مثالية':
    pct>=80?'✨ أحسنتِ!':
    pct>=60?'📖 جيد — راجعي الكلمات الحمراء':'💪 تحتاجين مراجعة';

  const display=document.getElementById('ayahDisplay');
  display.innerHTML='';
  results.forEach(r=>{
    const sp=document.createElement('span');
    if(r.status==='ok'){sp.className='w-ok';sp.textContent=r.ref;}
    else if(r.status==='err'){sp.className='w-err';sp.textContent=r.ref;sp.title='قلتِ: '+(r.user||'');}
    else{sp.className='w-missing';sp.textContent=r.ref;}
    display.appendChild(sp);
    display.appendChild(document.createTextNode(' '));
  });

  document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});
}

// theme
function applyTheme(m){document.documentElement.setAttribute('data-theme',m);document.getElementById('theme-toggle').textContent=m==='dark'?'☀️':'🌙';}
function toggleTheme(){const c=document.documentElement.getAttribute('data-theme')==='dark'?'dark':'light';const n=c==='dark'?'light':'dark';applyTheme(n);try{localStorage.setItem('quranTheme',n);}catch(e){}}
(function(){let s=null;try{s=localStorage.getItem('quranTheme');}catch(e){}if(!s)s=(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches)?'dark':'light';applyTheme(s);})();

// زر التسجيل معطل حتى يختار سورة
document.getElementById('recBtn').disabled=true;
document.getElementById('recBtn').style.opacity='0.5';
document.getElementById('recBtn').style.cursor='default';
// بمجرد اختيار سورة
document.getElementById('surahSelect').addEventListener('change',()=>{
  const btn=document.getElementById('recBtn');
  if(currentKey){btn.disabled=false;btn.style.opacity='1';btn.style.cursor='pointer';}
});
</script>
